de:"Excelente para Design Systems. Purge automático elimina CSS não usado.",curva:"Moderada. Requer aprender as classes utilitárias.",melhor_para:"Times que querem velocidade e consistência. Design Systems. Projetos React/Next.js.",gp_alerta:"Tailwind é excelente para times que criam Design Systems. Para agências que recebem designs variados de clientes, pode ser limitante.",grandes_projetos:"Muito bem — classes utilitárias garantem consistência sem conflitos de especificidade.",times_pequenos:"Ótimo — menos abstração para gerenciar, mais velocidade."},{id:"scss",nome:"SCSS / SASS",emoji:"🔷",definicao:"Superset do CSS com variáveis, mixins, funções e nesting. Compila para CSS.",produtividade:"Alta — elimina repetição com variáveis e mixins.",manutencao:"Melhor que CSS puro. Pior que Tailwind em projetos modernos.",escalabilidade:"Boa com arquitetura 7-1 ou similar. Pode criar complexidade desnecessária.",curva:"Baixa para quem já sabe CSS.",melhor_para:"Times com experiência em CSS clássico. Projetos que precisam de customização profunda.",gp_alerta:"SCSS é tecnologia sólida mas está perdendo espaço para Tailwind em projetos novos. Não é red flag — é preferência de time.",grandes_projetos:"Funciona bem com disciplina e arquitetura definida.",times_pequenos:"Boa opção. Familiar para a maioria dos devs."},{id:"bootstrap",nome:"Bootstrap",emoji:"🅱️",definicao:"Framework CSS com componentes prontos. Grid, botões, modais, formulários — tudo incluso.",produtividade:"Muito alta inicialmente. Cai quando precisar customizar profundamente.",manutencao:"Boa para o padrão Bootstrap. Ruim quando começa a lutar contra o framework.",escalabilidade:"Moderada. Tendência a criar dependência de convenções do Bootstrap.",curva:"Muito baixa. Ótimo para iniciantes.",melhor_para:"MVPs rápidos. Sistemas internos sem necessidade de design único. Times sem designer.",gp_alerta:"Bootstrap pode fazer o produto parecer genérico. Para produto com identidade visual forte, pode ser limitante. Para sistema interno ou MVP, é perfeito.",grandes_projetos:"Funciona mas pode criar inconsistências com componentes customizados.",times_pequenos:"Excelente — elimina decisões de design para time sem designer."},{id:"styled-components",nome:"Styled Components",emoji:"💅",definicao:"CSS-in-JS. Escreve CSS dentro do JavaScript, com escopo automático e props dinâmicas.",produtividade:"Alta para componentes complexos com estados visuais.",manutencao:"Boa — estilo e componente no mesmo lugar. Performance pode degradar em SSR.",escalabilidade:"Boa. Mas gera bundle maior e tem custo de performance em runtime.",curva:"Moderada para quem não conhece CSS-in-JS.",melhor_para:"Design Systems complexos com muitos estados visuais. Produtos com temas dinâmicos.",gp_alerta:"Styled Components adiciona peso ao bundle e tem custo de performance. Em 2025, muitos times estão migrando para Tailwind ou CSS Modules por isso.",grandes_projetos:"Funciona bem com disciplina. Mas cuidado com performance em SSR.",times_pequenos:"Pode ser excesso de abstração."},{id:"css-modules",nome:"CSS Modules",emoji:"📦",definicao:"Arquivos CSS com escopo local automático. Elimina conflitos de nomes sem JavaScript extra.",produtividade:"Moderada. Menos mágica que Styled Components, mais estrutura que CSS puro.",manutencao:"Excelente — arquivos CSS separados com escopo garantido.",escalabilidade:"Muito boa. Zero overhead de runtime.",curva:"Baixa. Quem sabe CSS aprende em minutos.",melhor_para:"Projetos que querem CSS clássico com escopo moderno. Next.js (suporte nativo).",gp_alerta:"CSS Modules é uma escolha conservadora e sólida. Sem hype, sem custo de runtime, sem surpresas.",grandes_projetos:"Excelente — escopo automático previne conflitos em bases de código grandes.",times_pequenos:"Boa opção simples e eficaz."}];const COMO_ESCOLHER_STACK={intro:"Não existe stack perfeita. Existe stack adequada para o contexto. A decisão mais importante não é qual tecnologia — é por que essa tecnologia para esse time nesse momento.",fatores:[{fator:"Tamanho e senioridade do time",peso:"crítico",descricao:"Uma stack sofisticada com time júnior é receita para débito técnico. A melhor stack é a que o time domina bem, não a que parece mais impressionante no README."},{fator:"Capacidade de contratação",peso:"crítico",descricao:"Se a stack for exótica, contratar o próximo dev vai ser caro e lento. Go e Elixir são tecnicamente excelentes mas têm pools de profissionais pequenos."},{fator:"Prazo e orçamento",peso:"alto",descricao:"Stack familiar ao time entrega mais rápido. Stack nova, mesmo sendo 'melhor', tem custo de aprendizado que não aparece na estimativa inicial."},{fator:"Expectativa de escala",peso:"alto",descricao:"MVP que não vai escalar não precisa de arquitetura para 10 milhões de usuários. Overengineering inicial é custo sem retorno."},{fator:"Manutenção de longo prazo",peso:"alto",descricao:"Quem vai manter esse sistema em 3 anos? Com que stack? Tecnologia que o time fundador domina mas ninguém mais usa é dívida técnica inevitável."},{fator:"Comunidade e documentação",peso:"medio",descricao:"Tecnologia com comunidade ativa tem mais soluções prontas, mais devs disponíveis e mais segurança de evolução. Tecnologia de nicho pode deixar o projeto órfão."},{fator:"Produto e experiência do usuário",peso:"medio",descricao:"App mobile nativo tem UX superior ao cross-platform em casos específicos. Web app pode ter performance abaixo do nativo. A stack afeta o produto final."}],red_flags_escolha:["Tech Lead escolheu a stack porque está aprendendo e quer praticar","Stack escolhida porque a empresa X usa — sem contexto do próprio projeto","Tecnologia nova sem nenhum membro do time com experiência prévia","Mudança de stack no meio do projeto sem justificativa crítica","Framework com menos de 2 anos de mercado para sistema crítico"],perguntas_gp:["Por que essa stack e não a alternativa mais comum?","Quantos devs com essa stack conseguimos contratar em 30 dias se precisarmos?","Quem no time já entregou um projeto em produção com essa stack?","Se o Tech Lead sair amanhã, o time consegue continuar?","Em 2 anos, quando precisarmos de manutenção, quem vai fazer?"]};const IMPACTO_GP={intro:"Um GP forte não precisa saber programar. Precisa saber o suficiente para identificar risco, fazer as perguntas certas e não ser enganado por complexidade técnica desnecessária.",nao_precisa:["Escrever código","Revisar pull requests tecnicamente","Definir arquitetura","Escolher bibliotecas"],precisa:[{ponto:"Entender o impacto de decisões técnicas no prazo",como:"Quando o dev diz 'vamos refatorar o banco de dados', pergunte: quanto tempo? O que para durante esse tempo? Qual o risco?"},{ponto:"Identificar overengineering",como:"'Por que precisamos de microsserviços para um CRUD com 200 usuários?' é uma pergunta legítima e importante."},{ponto:"Reconhecer débito técnico sendo acumulado",como:"'Estamos entregando rápido mas pulando testes' é um sinal. Pergunte: qual o plano de pagamento desse débito?"},{ponto:"Entender o custo de troca de tecnologia",como:"Mudar de banco de dados no sprint 8 não é uma tarde de trabalho. É semanas. Questione antes de aprovar."},{ponto:"Diferenciar problema técnico de problema organizacional",como:"'O sistema está lento' pode ser código ruim, arquitetura ruim, banco mal indexado, ou infra subdimensionada. Cada um tem solução e custo diferentes."},{ponto:"Proteger o time de escopo técnico disfarçado",como:"'Vamos só refatorar isso rapidinho' frequentemente não é rápido. Peça estimativa e inclua no backlog visível."}],conversas_com_devs:[{situacao:"Dev diz que vai 'refatorar tudo'",resposta:"'O que exatamente vai mudar? Qual o impacto para o usuário? Qual a estimativa? O que não pode parar durante a refatoração?'"},{situacao:"Time propõe nova tecnologia no meio do projeto",resposta:"'Qual o problema que essa tecnologia resolve que a atual não resolve? Qual o custo de migração? Quem tem experiência nisso hoje?'"},{situacao:"Dev diz que algo é 'simples'",resposta:"'Ótimo. Qual a estimativa em horas? E se aparecer alguma complicação, qual o plano B?' Simples tem estimativa."},{situacao:"Sprint não entregou por 'problema técnico'",resposta:"'O problema era previsível? Se sim, por que não foi levantado antes? Se não, como vamos garantir que algo assim apareça antes de virar bloqueio?'"}]};const RED_FLAGS_TECH=[{flag:"Hype sem necessidade",descricao:"Time propõe tecnologia nova porque está em alta, não porque resolve um problema real do projeto.",exemplos:["'Vamos usar IA porque é tendência' sem caso de uso definido","'Precisamos de microsserviços' para um sistema com 50 usuários","'Vamos migrar para Rust' porque o CTO leu um artigo"],impacto:"Custo de aprendizado, atraso na entrega, risco de abandono quando a tecnologia não resolver o problema.",pergunta_gp:"Qual problema específico do nosso projeto essa tecnologia resolve que a atual não resolve?"},{flag:"Dependência de herói",descricao:"Apenas uma pessoa entende uma parte crítica do sistema. Arquitetura ou tecnologia escolhida que só o dev X domina.",exemplos:["'Só o João sabe mexer no módulo de pagamento'","Stack exótica que só o Tech Lead conhece","Sem documentação porque 'o Dev B sabe tudo de cabeça'"],impacto:"Risco operacional severo. Qualquer ausência do herói para o projeto.",pergunta_gp:"Se essa pessoa não estivesse disponível por 2 semanas, o que aconteceria com o projeto?"},{flag:"Excesso de dependências",descricao:"Projeto com centenas de bibliotecas de terceiros para funcionalidades simples. Cada dependência é um vetor de risco.",exemplos:["Package.json com 400 dependências para um site simples","Bibliotecas que não têm manutenção há 2 anos","Dependência crítica com 1 único mantenedor"],impacto:"Vulnerabilidades de segurança, breaking changes inesperados, dificuldade de atualização.",pergunta_gp:"Quais são as 5 dependências mais críticas do projeto? Quando foram atualizadas pela última vez?"},{flag:"Arquitetura desnecessária",descricao:"Complexidade de solução incompatível com a complexidade do problema.",exemplos:["Microsserviços para um CRUD de 3 tabelas","Kubernetes para um sistema com 10 usuários simultâneos","Event sourcing para uma to-do list"],impacto:"Custo operacional alto, manutenção complexa, onboarding lento, bugs difíceis de rastrear.",pergunta_gp:"Qual o volume esperado de usuários e transações? A arquitetura proposta é compatível com esse volume agora?"},{flag:"Zero testes automatizados",descricao:"Sistema sem testes automatizados. Toda mudança é validada manualmente pelo cliente em produção.",exemplos:["'Não temos tempo para testes'","'O cliente valida antes de subir'","'Esse sistema é simples, não precisa de teste'"],impacto:"Cada deploy é um gamble. Regressões aparecem em produção. Refatoração se torna arriscada demais para acontecer.",pergunta_gp:"Qual é a cobertura de testes atual? O que acontece quando fazemos uma mudança grande — como validamos que nada quebrou?"},{flag:"Sem documentação de API",descricao:"APIs internas e externas sem documentação. Integração depende de conversa com o dev que escreveu.",exemplos:["'A documentação está na cabeça do Pedro'","Swagger nunca atualizado","Sem README explicando como rodar localmente"],impacto:"Onboarding de novos devs leva semanas. Integração com parceiros vira projeto. Bug de integração difícil de diagnosticar.",pergunta_gp:"Se eu precisar integrar um sistema externo com a nossa API hoje, qual a documentação disponível?"}];const TECH_NAO_E_SOLUCAO={tese:"Tecnologia não salva projeto ruim. Framework não substitui processo. Stack não resolve comunicação.",blocos:[{mito:"Trocar de tecnologia vai resolver o problema",realidade:"Na maioria dos casos, o problema não é a tecnologia — é a clareza de objetivo, o processo de descoberta ou a qualidade da comunicação. Um sistema mal especificado em React vai continuar mal especificado em Vue.",quando_faz_sentido_mudar:"Quando há evidência técnica clara de que a tecnologia atual é o gargalo — latência mensurável, custo de escala real, limitação documentada. Não como aposta."},{mito:"IA vai resolver",realidade:"IA é uma ferramenta poderosa para problemas específicos. Não é uma solução para falta de processo, requisitos mal definidos ou backlog sem dono. 'Vamos adicionar IA' sem caso de uso claro é hype disfarçado de estratégia.",quando_faz_sentido_mudar:"Quando há um problema específico que modelos de linguagem ou visão computacional resolvem melhor do que código determinístico."},{mito:"Microsserviços vão escalar melhor",realidade:"Microsserviços trocam complexidade de código por complexidade de infraestrutura. Um time que não consegue manter um monolito limpo não vai conseguir manter 20 microsserviços. Comece simples.",quando_faz_sentido_mudar:"Quando times diferentes precisam deployar independentemente. Quando partes do sistema têm requisitos radicalmente diferentes de escala."},{mito:"Com o framework certo entregamos mais rápido",realidade:"Velocidade de entrega é função de clareza de requisitos, capacidade do time e qualidade do processo — não do framework. Time sem critério de aceite claro não entrega rápido em nenhum framework.",quando_faz_sentido_mudar:"Quando a troca resolve um problema documentado de produtividade — não uma suposição."}],conclusao:"A questão não é qual tecnologia. É: qual problema você está resolvendo? Para quem? Com que time? Em que prazo? Com que orçamento? Respondidas essas perguntas, a tecnologia adequada se torna óbvia — ou ao menos o critério de escolha fica claro."};const GLOSSARIO_TECH_GP=[{termo:"API",simples:"Uma 'tomada' padronizada que permite que sistemas diferentes se conectem e troquem dados.",tecnico:"Interface de Programação de Aplicações — conjunto de endpoints que definem como sistemas se comunicam via HTTP/HTTPS.",impacto_gp:"Quando o dev fala 'a API está fora', significa que o sistema não consegue conversar com o serviço externo. Prazo impactado até o serviço voltar ou o mock ser implementado."},{termo:"Deploy",simples:"O ato de colocar uma nova versão do sistema em funcionamento para os usuários.",tecnico:"Processo de publicar código de desenvolvimento para ambiente de produção, podendo envolver build, testes automatizados e provisionamento de infraestrutura.",impacto_gp:"Todo deploy tem risco. Deploy sem smoke test e sem plano de rollback é risco desnecessário. Pergunte sempre: qual o plano se algo der errado?"},{termo:"Branch",simples:"Uma 'cópia paralela' do código onde o dev trabalha sem afetar o que está em produção.",tecnico:"Linha independente de desenvolvimento no controle de versão (Git) que diverge do código principal.",impacto_gp:"Muitas branches abertas por muito tempo é sinal de integração difícil à frente. Pergunte qual a política de merge do time."},{termo:"CI/CD",simples:"Um robô que automaticamente testa e publica o código quando o dev termina uma funcionalidade.",tecnico:"Continuous Integration / Continuous Delivery — pipeline automatizado de build, teste e deploy que garante qualidade consistente.",impacto_gp:"Time sem CI/CD testa manualmente e deploya manualmente. Mais lento, mais propenso a erro. É uma maturidade importante para projetos em crescimento."},{termo:"Tech Debt",simples:"Atalhos técnicos tomados agora que vão cobrar juros de lentidão e bugs no futuro.",tecnico:"Custo implícito de retrabalho adicional causado por escolhas de implementação que priorizaram velocidade sobre qualidade.",impacto_gp:"Débito técnico não gerenciado desacelera entregas progressivamente. Se o time nunca fala de débito técnico, provavelmente está acumulando sem visibilidade."},{termo:"Cache",simples:"Guardar uma resposta já calculada para servir mais rápido da próxima vez.",tecnico:"Armazenamento temporário de dados frequentemente acessados para reduzir latência e carga no servidor de origem.",impacto_gp:"'O usuário está vendo dados desatualizados' frequentemente é problema de cache mal configurado — não bug de lógica."},{termo:"Refactor",simples:"Reorganizar o código sem mudar o que ele faz — como reformar a cozinha sem mudar os eletrodomésticos.",tecnico:"Processo de reestruturar código existente sem alterar comportamento externo, para melhorar legibilidade, manutenibilidade ou performance.",impacto_gp:"Refatoração precisa de estimativa e slot no backlog como qualquer outra tarefa. 'Vou refatorar rapidinho' raramente é rápido."},{termo:"SSR",simples:"O servidor monta a página antes de enviar para o browser — mais rápido para o usuário ver o conteúdo.",tecnico:"Server-Side Rendering — renderização do HTML no servidor antes de enviar ao cliente, melhorando performance percebida e SEO.",impacto_gp:"Crucial para produtos que precisam de SEO. Sem SSR, motores de busca podem não indexar o conteúdo corretamente."},{termo:"SPA",simples:"O site carrega uma vez e depois atualiza as partes que mudam, sem recarregar a página inteira.",tecnico:"Single Page Application — aplicação web que carrega um único HTML e atualiza dinamicamente o conteúdo via JavaScript.",impacto_gp:"SPAs podem ter problema de SEO e carregamento inicial mais lento. Pergunte se o produto precisa ser indexado por buscadores."},{termo:"Microsserviços",simples:"Em vez de um sistema grande, vários sistemas pequenos e independentes que se comunicam.",tecnico:"Arquitetura onde a aplicação é dividida em serviços independentes com responsabilidades específicas, deployáveis separadamente.",impacto_gp:"Microsserviços aumentam a complexidade operacional significativamente. Só fazem sentido em times e produtos de certa escala."},{termo:"Monolito",simples:"Um sistema único que contém todas as funcionalidades juntas.",tecnico:"Arquitetura onde todos os componentes da aplicação são deployados como uma única unidade.",impacto_gp:"Monolito não é palavra feia. Para a maioria dos produtos, é a arquitetura certa. Problema quando cresce sem modularização interna."},{termo:"Autenticação",simples:"Verificar quem você é — o login.",tecnico:"Processo de verificar a identidade de um usuário ou sistema, geralmente via credenciais, tokens ou certificados.",impacto_gp:"Falha de autenticação é problema de segurança crítico. Certifique-se de que o time usa padrões estabelecidos (OAuth, JWT) e não implementação caseira."},{termo:"Autorização",simples:"Verificar o que você pode fazer depois de entrar — as permissões.",tecnico:"Processo de verificar se um usuário autenticado tem permissão para acessar um recurso ou executar uma ação.",impacto_gp:"Confundir autenticação com autorização é erro comum. Usuário pode estar logado mas não ter permissão para ver determinado dado. São problemas diferentes."},{termo:"Observabilidade",simples:"A capacidade de entender o que está acontecendo dentro do sistema quando algo dá errado.",tecnico:"Conjunto de práticas e ferramentas (logs, métricas, traces) que permitem entender o estado interno de um sistema a partir de seus outputs externos.",impacto_gp:"Sistema sem observabilidade é sistema que você descobre que quebrou quando o cliente liga. Com observabilidade, você sabe antes do cliente."},{termo:"Escalabilidade",simples:"A capacidade do sistema de aguentar mais usuários sem degradar a experiência.",tecnico:"Capacidade de um sistema de lidar com aumento de carga mantendo performance aceitável, seja horizontalmente (mais servidores) ou verticalmente (servidor mais poderoso).",impacto_gp:"Escalabilidade tem custo. Não projete para 10 milhões de usuários se você tem 1.000 hoje. Escale quando necessário, não preventivamente sem evidência."}];const PMBOK8_EVOLUCAO={intro:"O PMBOK 8 não é uma atualização de conteúdo. É uma atualização de mentalidade. A diferença entre a 7ª e a 8ª edição não está nos processos — está no que o mercado entendeu que gestão de projetos realmente significa.",o_que_mudou_de_verdade:[{mudanca:"De processo para mentalidade",antes:"O PMBOK ensinava o que fazer — grupos de processos, áreas de conhecimento, entradas e saídas. A gestão de projetos era quase uma receita de bolo: siga os passos, entregue o resultado.",depois:"A 8ª edição parte de uma premissa diferente: antes de fazer, você precisa pensar de uma forma específica. Mentalidade proativa, de ownership e orientada a valor. O processo decorre da mentalidade — não o contrário.",impacto_gp:"GP que só executa processo sem ter a mentalidade por trás vai continuar entregando outputs sem entregar outcomes. A diferença entre 'o sistema foi entregue' e 'o negócio mudou'."},{mudanca:"De Grupos de Processos para Áreas de Foco",antes:"Iniciação, Planejamento, Execução, Monitoramento & Controle, Encerramento eram grupos prescritivos. A maioria dos projetos tentava encaixar a realidade nesses moldes.",depois:"As mesmas cinco etapas voltam — mas como Áreas de Foco, não como receita. Um projeto ágil pode executar e encerrar um ciclo em duas semanas. Um projeto preditivo pode planejar por meses. O que importa é o propósito de cada momento, não a sequência.",impacto_gp:"Liberdade com responsabilidade. Você escolhe como aplicar cada área de foco — mas não pode ignorar nenhuma. Todo projeto precisa de iniciação clara, algum nível de planejamento, execução gerenciada, monitoramento honesto e encerramento real."},{mudanca:"De 12 para 6 Princípios",antes:"12 princípios na 7ª edição. Bons, mas muitos para internalizar e aplicar simultaneamente em situações de pressão.",depois:"6 princípios refinados, mais executáveis e menos sobrepostos: Visão Holística, Foco no Valor, Qualidade incorporada, Liderança Responsável, Sustentabilidade integrada, Cultura Empoderada.",impacto_gp:"Menos é mais aqui. Seis princípios que você realmente aplica valem mais que doze que você menciona em apresentações."},{mudanca:"De Áreas de Conhecimento para Domínios de Desempenho",antes:"10 Áreas de Conhecimento isoladas: escopo, tempo, custo, qualidade, recursos, comunicações, riscos, aquisições, partes interessadas, integração.",depois:"7 Domínios de Desempenho integrados: Governança, Escopo (incluindo qualidade), Cronograma, Finanças, Partes Interessadas, Recursos e Risco. Mais compacto, mais interconectado, com 40 processos não-prescritivos que se adaptam ao contexto.",impacto_gp:"O sinal mais importante: qualidade não é mais um domínio separado. Está dentro do Escopo. Porque qualidade não é uma fase — é uma responsabilidade distribuída em todo o projeto."},{mudanca:"Inteligência Artificial como realidade operacional",antes:"Tecnologia era apoio. Ferramentas de gestão. O GP usava software como instrumento.",depois:"A 8ª edição trata IA e ML como parte do trabalho de execução — não como optional extra. Automação de tarefas repetitivas, insights preditivos, alocação de recursos baseada em dados históricos, identificação de riscos antecipados.",impacto_gp:"GP que não sabe usar IA para gestão de projetos em 2025 é como GP que não sabia usar planilha em 2005. Não é vantagem competitiva — é requisito mínimo progressivo."},{mudanca:"Sustentabilidade como princípio, não como contexto",antes:"Sustentabilidade era um tema paralelo, uma seção de 'considerações', raramente integrada ao dia a dia da gestão.",depois:"O 6º princípio: integrar sustentabilidade em todas as áreas do projeto. ESG — ambiental, social e governança — como parte da avaliação de sucesso do projeto, não como apêndice.",impacto_gp:"Projetos que ignoram impacto social e ambiental vão enfrentar pressão crescente de clientes, investidores e reguladores. GP que entende ESG tem argumento de negócio, não só de consciência."}]};const PMBOK8_SEIS_PRINCIPIOS=[{numero:"01",nome:"Visão Holística",emoji:"🌐",cor:"var(--accent)",essencia:"Um projeto nunca existe sozinho. Ele existe dentro de uma organização, que existe dentro de um mercado, que existe dentro de um ecossistema. Ver só o projeto é ver uma parte do problema.",na_pratica:"Quando uma decisão técnica parece certa dentro do projeto mas vai contra a estratégia da empresa — a visão holística é o que detecta esse conflito antes que ele vire crise. GP que enxerga só o escopo contratado vai entregar o combinado e errar o objetivo.",sinais_de_ausencia:["Projeto entregue tecnicamente correto mas sem adoção pelo usuário","Decisão tomada que faz sentido para o projeto mas prejudica outra área","Stakeholder surpreso com impacto que 'ninguém havia considerado'"],pergunta_central:"Quem mais é afetado por cada decisão importante deste projeto — e eles sabem disso?"},{numero:"02",nome:"Foco no Valor",emoji:"💎",cor:"#00E587",essencia:"Entregável não é valor. Resultado é valor. Um sistema entregue que ninguém usa não é sucesso — é uma entrega cara de um projeto que falhou no que importava.",na_pratica:"O objetivo do projeto não é fechar o backlog. É mudar algo no negócio. Reduzir custo operacional, aumentar retenção de clientes, acelerar um processo. Se o GP não sabe qual o indicador de sucesso do negócio — não tem como saber se o projeto está no caminho certo.",sinais_de_ausencia:["Critério de sucesso definido como 'entregar dentro do prazo e orçamento'","Nenhuma métrica de negócio monitorada após o go-live","Cliente satisfeito no encerramento, insatisfeito 3 meses depois"],pergunta_central:"Se o projeto terminar hoje exatamente como planejado, o negócio vai estar melhor de forma mensurável? Como?"},{numero:"03",nome:"Qualidade Incorporada",emoji:"⚡",cor:"#FFD60A",essencia:"Qualidade não é uma fase de testes no final. É uma decisão tomada em cada requisito, cada critério de aceite, cada processo que o projeto usa para produzir seu resultado.",na_pratica:"Time que trata qualidade como última etapa vai descobrir os problemas quando o custo de corrigi-los é máximo. Time que incorpora qualidade no processo — nas histórias de usuário, nos critérios de aceite, nos code reviews — encontra os problemas quando o custo é mínimo.",sinais_de_ausencia:["QA acontece apenas no final do desenvolvimento","Critérios de aceite escritos depois que o desenvolvimento começou","Retrabalho consistente porque 'não era bem isso que queríamos'"],pergunta_central:"Como saberemos que cada entrega está pronta antes de desenvolvê-la? O critério existe ou será definido na hora de testar?"},{numero:"04",nome:"Liderança Responsável",emoji:"🧭",cor:"#BF5AF2",essencia:"Liderança em projetos não é autoridade formal. É influência exercida com responsabilidade — sobre o time, sobre os stakeholders, sobre os resultados, sobre as decisões tomadas sob pressão.",na_pratica:"O GP responsável não apenas gerencia o processo — assume o resultado. Não diz 'o dev atrasou' — diz 'meu projeto atrasou, aqui está o que farei'. Não diz 'o cliente mudou o escopo' — diz 'identifiquei uma mudança, aqui está o impacto e a proposta'. Ownership de verdade, não de cerimônia.",sinais_de_ausencia:["GP que tem resposta para qualquer problema exceto o que é responsabilidade dele","Postmortem onde ninguém assume nenhuma decisão ruim","Time que não reporta problemas porque 'o GP vai culpar alguém'"],pergunta_central:"Quando este projeto der errado, você vai assumir o resultado ou explicar as causas externas?"},{numero:"05",nome:"Sustentabilidade Integrada",emoji:"🌱",cor:"#26A69A",essencia:"Todo projeto tem impacto além das suas entregas. Impacto nas pessoas que vão usar, nos times que vão manter, no ambiente organizacional que vai absorver a mudança — e às vezes no mundo além da empresa.",na_pratica:"Sustentabilidade no contexto de projetos tech não é só painel solar. É: o sistema que estou entregando vai criar burnout no time de suporte? A automação que estou implementando vai eliminar postos de trabalho sem plano de transição? O projeto vai criar débito técnico que outra equipe vai pagar por anos?",sinais_de_ausencia:["Projeto entregue que cria mais problemas operacionais do que resolve","Decisão de prazo que sacrifica sustentabilidade do time","Nenhuma consideração sobre quem vai manter o que foi entregue"],pergunta_central:"Quem vai viver com as consequências deste projeto nos próximos 2 anos? Eles foram considerados nas decisões?"},{numero:"06",nome:"Cultura Empoderada",emoji:"🔥",cor:"#FF6B35",essencia:"Time empoderado não precisa de permissão para cada decisão. Tem clareza de objetivo, autonomia de método e responsabilidade compartilhada pelo resultado. Isso não é liderança fraca — é liderança madura.",na_pratica:"GP que centraliza todas as decisões cria gargalo, não segurança. O objetivo é criar as condições para que o time tome as decisões certas sem precisar perguntar — e isso exige: objetivo claro, contexto compartilhado, confiança construída ao longo do tempo, e segurança psicológica para errar e reportar.",sinais_de_ausencia:["Dev esperando aprovação para decisão técnica rotineira","Daily virando reunião de reporte para o GP em vez de sync do time","Time que para quando o GP está ausente por um dia"],pergunta_central:"Se você saísse por duas semanas amanhã, o time saberia o que fazer — e teria a autonomia para fazer?"}];const PMBOK8_GP_MODERNO={tese:"O GP moderno não é mais um gerente de processo. É um arquiteto de contexto — alguém que cria as condições para que times inteligentes entreguem resultados relevantes.",dimensoes:[{dimensao:"Proativo",cor:"var(--accent)",desc:"Antecipa, não reage. Identifica o risco antes de virar problema. Comunica o impacto antes de virar surpresa. Faz a pergunta difícil antes que a situação a force.",pratica:"Revisão semanal de riscos não é cerimônia — é inteligência operacional. O que pode bloquear as próximas duas sprints? Já foi acionado?"},{dimensao:"Ownership",cor:"#BF5AF2",desc:"Assume o resultado, não apenas o processo. Não gerencia o backlog — é responsável pelo valor entregue. A diferença entre 'eu fiz minha parte' e 'o projeto chegou onde precisava chegar'.",pratica:"Na próxima review, apresente não apenas o que foi entregue — mas o que mudou no negócio por causa do que foi entregue. Se não há resposta, há problema."},{dimensao:"Orientado a Valor",cor:"#00E587",desc:"Cada decisão passa pelo filtro: isso aumenta o valor entregue ao negócio? Se a resposta é 'não sei' — há um problema de alinhamento anterior que precisa ser resolvido antes de qualquer execução.",pratica:"Defina com o sponsor, antes de qualquer sprint, qual é o indicador de negócio que este projeto deve mover. Monitore esse indicador — não apenas velocity."}],competencias_novas:[{comp:"Alfabetização em IA",desc:"Saber o que IA pode e não pode fazer em gestão de projetos. Usar para estimativas, identificação de padrões de risco, automação de relatórios. Não terceirizar julgamento — usar dados para informar decisão."},{comp:"Pensamento Sistêmico",desc:"Ver o projeto como parte de um sistema maior. Identificar efeitos colaterais de decisões antes que se tornem problemas. Mapear dependências invisíveis."},{comp:"Leitura Organizacional",desc:"Entender dinâmicas de poder, cultura de tomada de decisão e onde a resistência real vai aparecer — antes de aparecer. A parte do PMBOK que nenhum livro ensina direito."},{comp:"Comunicação Orientada a Valor",desc:"Traduzir status técnico em impacto de negócio. 'O módulo de pagamento está 70% completo' vs 'em 2 semanas o cliente pode processar pedidos online — aqui está o impacto esperado em receita'."},{comp:"Facilitação de Decisões Difíceis",desc:"Criar as condições para que stakeholders tomem decisões que precisam ser tomadas — mesmo as que ninguém quer tomar. Sem empurrar, sem evitar."}]};const PMBOK8_DOMINIOS=[{id:"governanca",nome:"Governança",emoji:"🏛",cor:"var(--accent)",o_que_e:"A estrutura que orienta decisões e atividades do projeto para maximizar entrega de valor. Não é burocracia — é o sistema que decide como decisões são tomadas.",por_que_importa:"Sem governança clara, quem decide o quê? Quando o prazo e o escopo entram em conflito, quem tem autoridade? Quando o cliente pede algo fora do contrato, qual é o processo? Governança responde essas perguntas antes que virem crises.",sinal_saudavel:"Toda decisão importante tem um dono identificado, um processo definido e um registro documentado.",sinal_problema:"Decisões importantes são tomadas em reuniões informais, revertidas em outras reuniões informais, e ninguém sabe ao certo o que está vigente.",gp_na_pratica:"Sua primeira entrega em qualquer projeto: uma matriz de decisão. Quem aprova o quê. Qual o tempo de resposta esperado. O que acontece se não houver decisão."},{id:"escopo",nome:"Escopo + Qualidade",emoji:"📐",cor:"#00E587",o_que_e:"O que o projeto vai produzir — e em qual padrão. Qualidade agora está integrada ao escopo porque não faz sentido definir o que será feito sem definir como saberemos que está bem feito.",por_que_importa:"Escopo sem qualidade é permissão para entregar qualquer coisa que caiba no prazo. Qualidade sem escopo é perfecionismo sem direção. Juntos, definem o resultado real.",sinal_saudavel:"Cada requisito tem um critério de aceite claro antes do desenvolvimento começar.",sinal_problema:"'Pronto' é uma opinião — e cada stakeholder tem uma diferente.",gp_na_pratica:"Critério de aceite não é detalhe técnico. É o contrato de qualidade com o cliente. Escreva antes de qualquer sprint começar."},{id:"cronograma",nome:"Cronograma",emoji:"📅",cor:"#FFD60A",o_que_e:"Quando o quê será feito, por quem, com que dependências. Não é uma promessa — é uma ferramenta de decisão que evolui com o projeto.",por_que_importa:"Cronograma serve para identificar quando algo está em risco — não para culpar alguém quando o risco se materializa. O valor do cronograma é o que você descobre ao criá-lo: as dependências, os gargalos, os riscos invisíveis.",sinal_saudavel:"Cronograma atualizado toda sprint com desvios documentados e causa raiz identificada.",sinal_problema:"Cronograma criado no início do projeto e nunca mais atualizado. Existe no papel, não na gestão.",gp_na_pratica:"Pergunta mais útil ao analisar um cronograma: 'Qual o caminho crítico hoje — e quais são os dois maiores riscos sobre ele?'"},{id:"financas",nome:"Finanças",emoji:"💰",cor:"#FF6B35",o_que_e:"Orçamento, estimativas, controle de custos e visão do ROI. A dimensão que conecta a execução técnica à decisão de negócio.",por_que_importa:"GP que não entende o orçamento do projeto não entende as restrições reais. Toda decisão de escopo é uma decisão financeira. Toda mudança de prazo é uma mudança de custo.",sinal_saudavel:"GP consegue responder 'quanto vai custar terminar?' em qualquer ponto do projeto — não apenas 'quanto já foi gasto'.",sinal_problema:"Orçamento é responsabilidade exclusiva do financeiro. GP não sabe o burn rate semanal.",gp_na_pratica:"EAC (Estimate at Completion) toda sprint: dado o que gastamos e o que fizemos, qual é a previsão de custo final? Surpresa no encerramento é falha de monitoramento."},{id:"stakeholders",nome:"Partes Interessadas",emoji:"🎭",cor:"#BF5AF2",o_que_e:"Identificar, engajar e manter alinhados todos que têm interesse ou são afetados pelo projeto — durante todo o ciclo de vida, não apenas no início.",por_que_importa:"Stakeholder desalinhado é risco não gerenciado. O patrocinador que aprovou o projeto em janeiro pode ter mudado de prioridade em junho. Se você não sabe disso, a mudança vai aparecer como surpresa no momento mais custoso.",sinal_saudavel:"GP sabe o nível de engajamento atual de cada stakeholder crítico e tem plano para manter ou elevar.",sinal_problema:"Stakeholder register foi criado no kick-off e nunca mais atualizado.",gp_na_pratica:"Todo mês: revise os 5 stakeholders mais críticos. Qual o nível de engajamento atual? Mudou desde o último mês? O que mudou no contexto deles?"},{id:"recursos",nome:"Recursos",emoji:"👥",cor:"#26A69A",o_que_e:"Time, tecnologia, infraestrutura e orçamento necessários para executar. Inclui adquirir, desenvolver, liderar e liberar recursos ao longo do projeto.",por_que_importa:"Recurso não é insumo — é gente. Gente que tem capacidade real (não a que aparece no orgchart), contexto simultâneo (não trabalha só no seu projeto), e limite de energia (não é infinitamente comprimível).",sinal_saudavel:"Capacidade planejada vs capacidade real é monitorada. GP sabe o que está consumindo o tempo do time além das tarefas visíveis.",sinal_problema:"Velocity caindo sem ninguém investigar o que o time está fazendo que não está no board.",gp_na_pratica:"Mapa de capacidade real: cada membro do time, quantas horas por semana têm disponíveis para este projeto de verdade. Não o que o contrato diz — o que a realidade permite."},{id:"risco",nome:"Risco",emoji:"⚠️",cor:"#FF2D55",o_que_e:"Identificar, analisar, responder e monitorar incertezas que podem afetar o projeto positiva ou negativamente. Risco inclui oportunidades — não apenas ameaças.",por_que_importa:"Risk Register que ninguém atualiza é documento, não gestão. Risco real é o que o time sabe mas não escalou, o que o cliente mencionou de passagem e ninguém documentou, o que a dependência técnica implica mas ninguém calculou.",sinal_saudavel:"Top 3 riscos do projeto são revisados toda semana. Novos riscos aparecem no backlog — não nas reuniões de crise.",sinal_problema:"Risk Register tem os mesmos riscos desde o início do projeto, todos com status 'mitigado' sem evidência.",gp_na_pratica:"A pergunta mais poderosa de gestão de riscos: 'O que poderia fazer este projeto falhar que ainda não está no nosso radar?'"}];const MobileWarning=()=>{const[dismissed,setDismissed]=React.useState(false);if(dismissed)return null;return/*#__PURE__*/React.createElement("div",{style:{display:'none',position:'fixed',bottom:0,left:0,right:0,zIndex:9995,background:'rgba(8,8,16,0.97)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',borderTop:'1px solid var(--border2)',padding:'20px 20px 28px',animation:'fadeUp 0.4s var(--ease-out-expo) both'},className:"mobile-warning"},/*#__PURE__*/React.createElement("div",{style:{maxWidth:380,margin:'0 auto'}},/*#__PURE__*/React.createElement("div",{style:{display:'flex',alignItems:'center',gap:10,marginBottom:12}},/*#__PURE__*/React.createElement("div",{style:{width:32,height:32,borderRadius:8,background:'rgba(255,214,10,0.1)',border:'1px solid rgba(255,214,10,0.2)',display:'flex',alignItems:'center',justifyContent:'center'
