to é secundário.",impacto_projeto:"Decisões revertidas sem transparência. Conflito de autoridade. Time confuso sobre direção.",como_responder:["Documente absolutamente tudo — toda decisão, toda aprovação, todo alinhamento","Copie sempre mais de uma pessoa nas comunicações críticas","Identifique quem são os aliados naturais do stakeholder político e mapeie a dinâmica","Nunca entre em confronto direto — apresente fatos, não opiniões"],proteja_o_time:"Time não precisa saber da dinâmica política. Sua função é absorver o ruído e entregar direção clara."}];const INCIDENTES_REVELAM=[{evento:"Uma crise em produção",revela:[{aspecto:"Cultura de responsabilidade",sinal_positivo:"Time comunica proativamente, sem finger-pointing, postmortem acontece em 48h.",sinal_negativo:"Silêncio inicial, busca por culpado, postmortem nunca acontece ou vira reunião de punição."},{aspecto:"Maturidade da observabilidade",sinal_positivo:"Time sabe em minutos onde está o problema. Logs, traces, alertas funcionando.",sinal_negativo:"Horas para encontrar a causa. Sem logs. Sem alertas. 'Descobrimos pelo cliente.'"},{aspecto:"Processo de decisão sob pressão",sinal_positivo:"Há clareza de quem decide: rollback, hotfix, comunicação ao cliente.",sinal_negativo:"Paralisia por comitê. Todos opinam, ninguém decide. GP não sabe o que autorizar."},{aspecto:"Qualidade do planejamento",sinal_positivo:"Rollback planejado. Smoke test existia. Migration tinha reversão.",sinal_negativo:"Rollback inexistente. Deploy feito sem validação. Surpresa total."}]},{evento:"Bugs recorrentes no mesmo módulo",revela:[{aspecto:"Ausência de testes naquela área",sinal_positivo:"Time identifica rápido, corrige e adiciona teste. Não volta.",sinal_negativo:"Corrige sem teste. Mesmo bug ou variação volta em 3 semanas."},{aspecto:"Débito técnico não pago",sinal_positivo:"Time articula o débito e propõe refatoração como prevenção.",sinal_negativo:"'Esse módulo sempre foi problemático.' Normalização do problema."},{aspecto:"Ownership frágil",sinal_positivo:"Dev que cuida daquele módulo investiga com profundidade.",sinal_negativo:"Ninguém quer ser responsável. 'Não fui eu que escrevi.'"}]},{evento:"Sprint que não entrega o combinado",revela:[{aspecto:"Qualidade do refinamento",sinal_positivo:"Time refinamento adequado. Estimativas calibradas com histórico.",sinal_negativo:"Histórias sem critério de aceite. Estimativas baseadas em otimismo."},{aspecto:"Capacidade real vs. capacidade declarada",sinal_positivo:"Time comunica bloqueios cedo. Há processo para re-priorizar.",sinal_negativo:"Bloqueios aparecem na review. Ninguém falou antes. GP descobre ao vivo."},{aspecto:"Pressão excessiva",sinal_positivo:"Time empurra de volta quando sprint está sobrecarregada.",sinal_negativo:"Time aceita tudo e entrega metade. Comprometimento sem resistência = planejamento ruim."}]},{evento:"Silêncio em reuniões técnicas",revela:[{aspecto:"Psicologia de segurança",sinal_positivo:"Time silencia em tópicos pontuais, mas questiona em outros. Seletivo.",sinal_negativo:"Silêncio generalizado. Ninguém questiona nada. Reunião de aprovação performática."},{aspecto:"Histórico de punição por discordância",sinal_positivo:"Ausência — time não teme discordar.",sinal_negativo:"Alguém foi punido publicamente por questionar. Time aprendeu a calar."},{aspecto:"Decisões já tomadas antes da reunião",sinal_positivo:"Reunião para alinhamento genuíno, não para validação de decisão já feita.",sinal_negativo:"Decisão chegou pronta. A 'reunião' é encenação de consulta."}]},{evento:"Retrabalho constante",revela:[{aspecto:"Clareza de requisitos",sinal_positivo:"Critérios de aceite existem e são respeitados.",sinal_negativo:"Requisito muda depois que o dev começou. 'Não era bem isso.'"},{aspecto:"Alinhamento de expectativa",sinal_positivo:"Cliente vê o produto em desenvolvimento, dá feedback cedo.",sinal_negativo:"Cliente só vê na entrega final. Surpresa garantida."},{aspecto:"Discovery insuficiente",sinal_positivo:"Time investigou o problema antes de propor solução.",sinal_negativo:"Time foi direto para a solução sem entender o problema real."}]}];const MAPA_SOBREVIVENCIA=[{cenario:"Engenharia travada — nada saindo",emoji:"🧱",o_que_esta_acontecendo:"O time de dev não está entregando. Pode ser bloqueio técnico, sobrecarga não declarada, desmotivação ou conflito interno não resolvido.",quem_acionar:[{papel:"Tech Lead",como:"Conversa 1:1, não em reunião de grupo. Pergunta aberta: 'O que está impedindo o time de avançar?' Sem julgamento."},{papel:"Dev mais experiente",como:"Se o Tech Lead não revelar, converse individualmente com o dev que mais parece sobrecarregado."}],sinais_que_precisa_escalar:"Tech Lead não consegue articular o bloqueio. Situação persiste por mais de 1 sprint sem melhora.",nao_faca:"Não pressione por velocidade sem entender a causa. Pressão sobre causa desconhecida cria mais caos."},{cenario:"Cliente explodindo — hostil e pressionando",emoji:"🌋",o_que_esta_acontecendo:"O cliente está em modo de ataque. Pode ser frustração acumulada, pressão interna dele, ou problema real não resolvido.",quem_acionar:[{papel:"Você mesmo, imediatamente",como:"Não defenda. Não contra-ataque. Ouça. 'Entendo que a situação está impactando vocês. Quero entender o que está causando mais frustração.'"},{papel:"Seu gestor/diretor",como:"Se o cliente escalou para cima na hierarquia dele, você precisa de suporte hierárquico do seu lado também. Não enfrente sozinho."}],sinais_que_precisa_escalar:"Cliente menciona contrato, advogado ou rescisão. Você não tem autoridade para resolver o problema raiz.",nao_faca:"Não entre em modo de defesa técnica quando o problema é emocional e relacional. Não envie e-mail longo — ligue."},{cenario:"Ninguém decide — projeto paralisado",emoji:"🫥",o_que_esta_acontecendo:"Decisão crítica pendente. Cliente não decide. Stakeholders divergem. Projeto em standby consumindo prazo.",quem_acionar:[{papel:"Decisor real (não o contato operacional)",como:"Identifique quem tem autoridade real. Vá diretamente. 'Precisamos de uma decisão sobre X até Y. Posso reservar 20 minutos com você?'"},{papel:"Seu gestor",como:"Se você não tem acesso ao decisor real, seu gestor pode criar o canal."}],sinais_que_precisa_escalar:"Mais de 2 semanas sem decisão que bloqueia entrega principal.",nao_faca:"Não tome a decisão pelo cliente. Documente a indecisão e o impacto. Torne o custo visível."},{cenario:"Time em burnout — desgaste visível",emoji:"🔋",o_que_esta_acontecendo:"O time está exausto. Pode ser sobrecarga de trabalho, pressão excessiva, falta de senso de progresso ou ambiente tóxico.",quem_acionar:[{papel:"Tech Lead",como:"Conversa franca: 'Percebo que o time está sobrecarregado. O que preciso fazer para protegê-los nos próximos 30 dias?'"},{papel:"Seu gestor",como:"Se a carga é estrutural (não pontual), você precisa de suporte para negociar capacidade com o cliente."}],sinais_que_precisa_escalar:"Pessoas pedindo demissão. Qualidade caindo drasticamente. Time incapaz de funcionar.",nao_faca:"Nunca normalize burnout. 'Todo mundo está cansado' não é justificativa — é sintoma de problema de gestão."},{cenario:"Conflito entre áreas — produto vs. engenharia",emoji:"⚔️",o_que_esta_acontecendo:"Produto quer velocidade. Engenharia quer qualidade. Cada lado sente que o outro está sendo irresponsável. O GP está no meio.",quem_acionar:[{papel:"Tech Lead e PO/PM juntos",como:"Reunião facilitada por você com os dois lados. Objetivo: tornar o trade-off explícito, não resolver quem tem razão."},{papel:"Liderança de ambas as áreas",como:"Se o conflito é crônico e não resolve no nível operacional."}],sinais_que_precisa_escalar:"Conflito virou pessoal. Pessoas não se comunicando diretamente. Decisões sendo sabotadas passivo-agressivamente.",nao_faca:"Não escolha um lado. Você perde a confiança do outro lado e perde a capacidade de mediar."}];const IA_PARA_GPS={intro:"IA não vai substituir o GP. Mas o GP que usa IA bem vai substituir o que não usa. A diferença não está em usar — está em saber o que pedir e como avaliar o que recebe.",riscos:[{risco:"Alucinação com confiança",desc:"O LLM vai gerar critérios de aceite, riscos e estimativas que parecem sólidos mas são genéricos ou incorretos para o seu contexto específico.",como_evitar:"Nunca use output de IA sem revisar com o contexto real do projeto. A IA não conhece sua arquitetura, seu time, seu cliente."},{risco:"Especificidade falsa",desc:"Prompt vago → resposta bonita mas inútil. 'Me dê os riscos desse projeto' sem contexto vai gerar uma lista de riscos genéricos que se aplicam a qualquer projeto.",como_evitar:"Contexto é tudo. Quanto mais específico o input, mais útil o output."},{risco:"Dependência que atrofia o julgamento",desc:"GP que usa IA para pensar ao invés de pensar com IA perde progressivamente a capacidade de análise independente.",como_evitar:"Use IA como segundo par de olhos, não como primeiro. Forme sua opinião antes de consultar."}],como_revisar:["Verifique: faz sentido para o contexto específico do SEU projeto?","Verifique: os riscos identificados já foram observados na prática ou são genéricos?","Verifique: as perguntas geradas são perguntas que você já não sabia que precisavam ser feitas?","Se você não consegue avaliar a qualidade do output da IA, você não entende o suficiente do assunto para usar o output."],prompts:[{categoria:"Critérios de Aceite",ruim:"Me dê critérios de aceite para um módulo de pagamento.",mediano:"Me dê critérios de aceite para um módulo de pagamento Pix em um e-commerce.",excelente:"Você é um engenheiro de requisitos sênior. Estou construindo um módulo de pagamento Pix para um e-commerce de médio porte (5k pedidos/dia). O backend é Node.js, o frontend é React. A integração é com a API do Banco Central via parceiro [nome]. Gere critérios de aceite cobrindo: fluxo feliz, fluxo de falha, idempotência, timeout, webhook de confirmação e reconciliação. Formato Gherkin (DADO/QUANDO/ENTÃO). Máximo 15 critérios.",por_que_funciona:"Contexto técnico específico, volume de dados, tecnologia, parceiro, e formato de saída definido. A IA tem o que precisa para ser útil."},{categoria:"Histórias de Usuário",ruim:"Escreva histórias de usuário para um sistema de cadastro.",mediano:"Escreva histórias de usuário para o cadastro de clientes de uma fintech.",excelente:"Você é um Product Owner experiente em fintech B2B. Preciso de histórias de usuário para o cadastro de clientes empresariais (PJ) de uma plataforma de crédito. Usuários: analistas de crédito (internos) e sócios das empresas (externos). Fluxo: empresa solicita crédito → analista valida documentos → sistema faz consulta automática na Receita Federal → analista aprova ou rejeita. Gere 5 histórias cobrindo os fluxos mais críticos. Inclua critérios de aceite básicos e identifique dependências técnicas óbvias.",por_que_funciona:"Personas definidas, fluxo completo, tecnologia externa envolvida, número limitado de histórias, solicitação de dependências."},{categoria:"Análise de Risco",ruim:"Quais são os riscos desse projeto?",mediano:"Quais são os riscos de um projeto de integração com ERP?",excelente:"Você é um gerente de projetos sênior especializado em integrações enterprise. Estou gerenciando um projeto de integração entre um e-commerce (React + Node.js, 3 devs) e um ERP legado (TOTVS Protheus, versão 12). A integração envolve pedidos, estoque e nota fiscal. Prazo: 3 meses. Time de TI do cliente é pequeno e sobrecarregado. Não há sandbox do ERP disponível — os testes serão em produção. Identifique os 8 riscos mais críticos com: probabilidade (A/M/B), impacto (A/M/B), gatilho de materialização e mitigação específica para ESSE contexto.",por_que_funciona:"Contexto técnico detalhado, restrições reais (sem sandbox), limitações do time, formato de saída específico."},{categoria:"Comunicação Executiva",ruim:"Escreva um update de projeto para o cliente.",mediano:"Escreva um status report semanal para um projeto de software.",excelente:"Você é um gerente de projetos sênior comunicando para um diretor de operações de uma empresa de varejo. O projeto é a implantação de um sistema de gestão de pedidos (OMS). Contexto desta semana: entregamos o módulo de rastreamento (conforme planejado). O módulo de integração com transportadoras está 3 dias atrasado por instabilidade na API de um parceiro — ETA revisado: quinta. Próxima semana: testes de carga. Risco principal: volume de pedidos da Black Friday pode exigir escalonamento de infra (decisão necessária até amanhã). Escreva um status de 3 parágrafos: progresso, riscos com decisão necessária, próximos passos. Tom: direto e executivo. Sem jargão técnico.",por_que_funciona:"Persona do destinatário, contexto específico da semana, atraso com causa e ETA, decisão específica necessária, formato e tom definidos."},{categoria:"Troubleshooting",ruim:"Me ajude com um problema de performance.",mediano:"Me ajude a investigar latência alta em uma API.",excelente:"Você é um engenheiro de confiabilidade sênior. Temos uma API REST (Node.js + PostgreSQL) com latência P95 subindo de 300ms para 2400ms nas últimas 48h. Não houve deploy recente. Volume de tráfego estável (sem pico). Os logs mostram: `Slow query: SELECT * FROM orders JOIN items ON... — 1847ms`. A tabela orders tem 8.2 milhões de registros. Não há índice em orders.created_at que é usado no filtro. Me dê: (1) diagnóstico mais provável com justificativa, (2) comandos SQL para investigar, (3) solução imediata (sem downtime) e (4) solução definitiva com estimativa de esforço.",por_que_funciona:"Stack técnica, métricas específicas, log real, volume de dados, restrição (sem downtime), estrutura de resposta pedida."}]};const STACKS_PARA_GPS=[{id:"frontend-vs-backend",titulo:"Frontend vs. Backend: o que realmente importa para o GP",desc:"Você não precisa saber programar. Mas precisa entender as implicações de cada escolha.",impactos:[{aspecto:"Prazo e disponibilidade de devs",frontend:"React tem o maior ecossistema de devs no mercado brasileiro. Contratar ou substituir é mais fácil.",backend:"Node.js e Python são os mais disponíveis. Java e C# têm mais oferta em enterprise. Go e Rust: poucos devs, muito caros."},{aspecto:"Débito técnico",frontend:"Frameworks de frontend evoluem muito rápido (React, Next.js, etc.). O que é moderno hoje pode ser legado em 3 anos.",backend:"Backend tende a ser mais estável. Java EE de 2008 ainda roda em produção em grandes empresas. Longevidade maior."},{aspecto:"Custo de manutenção",frontend:"Alta rotatividade de bibliotecas. Atualizar pode quebrar partes do sistema.",backend:"APIs bem desenhadas são estáveis por anos. Custo de manutenção menor se bem construído."}]},{id:"mobile",titulo:"Mobile: React Native vs. Nativo vs. Flutter",desc:"Essa decisão afeta custo, prazo e experiência do usuário por anos.",impactos:[{aspecto:"Custo de desenvolvimento",reactNative:"1 time para iOS e Android. Mais barato.",nativo:"2 times separados (Swift para iOS, Kotlin para Android). 2x o custo.",flutter:"1 time, multiplataforma. Custo similar ao React Native."},{aspecto:"Performance e experiência",reactNative:"Performance muito boa para maioria dos casos. Não para jogos ou apps de câmera complexos.",nativo:"Performance máxima. Apps que exigem integração profunda com hardware.",flutter:"Performance excelente. Experiência visual pode parecer 'diferente' do nativo em alguns elementos."},{aspecto:"Disponibilidade de devs",reactNative:"Maior pool de devs (usa JavaScript/React).",nativo:"Devs Swift e Kotlin são especializados — mais caros, menos disponíveis.",flutter:"Crescendo, mas ainda menor que React Native."}]},{id:"banco-decisao",titulo:"A escolha do banco de dados: impacto que dura anos",desc:"Trocar banco de dados em produção é um dos projetos mais caros que existem. A decisão feita no sprint 1 vai durar a vida do produto.",impactos:[{aspecto:"PostgreSQL (relacional)",quando:"Dados com relações complexas, sistemas financeiros, necessidade de ACID. É a escolha padrão mais segura.",risco_gp:"Se o time propõe algo diferente sem justificativa clara, questione."},{aspecto:"MongoDB (NoSQL documentos)",quando:"Catálogos de produtos com estrutura variável, dados que mudam de schema frequentemente.",risco_gp:"MongoDB vira problema quando o time começa a implementar JOINs manualmente. Se o dev diz 'precisamos fazer lookup', o esquema foi modelado errado."},{aspecto:"Redis (cache/sessão)",quando:"Cache de dados frequentemente acessados, sessões de usuário, filas simples.",risco_gp:"Redis sozinho não é banco principal. Se alguém propõe armazenar dados críticos só no Redis (sem persistência), é risco alto."}]},{id:"cloud-decisao",titulo:"Cloud provider: o lock-in que ninguém fala",desc:"Migrar de cloud provider é projeto de 6-18 meses. Essa decisão tem consequências de longo prazo.",impactos:[{aspecto:"AWS (Amazon)",gp_precisa_saber:"Maior ecossistema, mais devs disponíveis, mais documentação. Custo pode ser mais alto. Pricing complexo — fácil gastar mais do que planejado."},{aspecto:"Azure (Microsoft)",gp_precisa_saber:"Melhor para empresas que já usam produtos Microsoft (Office 365, Active Directory). Integração com ferramentas enterprise é mais natural."},{aspecto:"GCP (Google)",gp_precisa_saber:"Excelente para dados e IA/ML. Menor ecossistema de devs no Brasil. Escolha específica para casos de uso de dados."},{aspecto:"Vendor lock-in",gp_precisa_saber:"Usar serviços proprietários de um cloud (AWS Lambda, DynamoDB, etc.) ao invés de soluções open-source torna a migração muito mais cara. Pergunte ao Tech Lead: 'Quão portável é essa arquitetura?'"}]}];const PMBOK_VIDA_REAL={intro:"O PMBOK não é um livro de regras — é um vocabulário compartilhado e um conjunto de boas práticas. A sabedoria está em saber o que usar, quando usar e o que adaptar.",onde_funciona_bem:[{area:"Contratos e escopo",desc:"Em projetos com contrato formal, o PMBOK é seu aliado legal. Work Breakdown Structure, change management, scope creep documentation — são ferramentas que protegem você juridicamente.",como_usar:"Toda mudança de escopo vira Change Request formal. Com assinatura. Com impacto documentado. Isso é PMBOK funcionando para proteger o projeto."},{area:"Projetos grandes e distribuídos",desc:"Em projetos com múltiplos times, múltiplos países, múltiplas organizações, o processo formal é o que cria coordenação onde não há confiança orgânica.",como_usar:"Risk Register, Communications Plan, Stakeholder Register não são burocracia — são o protocolo que mantém alinhamento quando a complexidade é alta demais para conversas informais."},{area:"Governança corporativa",desc:"Enterprise exige rastreabilidade. Audit trail. Documentação de decisões. O PMBOK tem framework para isso.",como_usar:"ADRs, lessons learned, formal acceptance são o que auditorias pedem. Em ambiente regulado (financeiro, saúde), é obrigatório."}],onde_quebra:[{area:"Startups e times pequenos",desc:"Sprint planning de 8h, Risk Register de 50 páginas e RACI matrix para time de 4 pessoas é teatro. O processo custa mais do que o risco que mitiga.",adaptacao:"Tailoring: use o princípio (gerenciar riscos) sem a cerimônia completa. Um comentário semanal no Slack: 'Principal risco desta semana: dependência da API do banco. Mitigação: mock até segunda.' É suficiente."},{area:"Projetos de produto digital iterativo",desc:"O PMBOK foi desenhado para projetos com início, meio e fim definidos. Produto digital é contínuo. O que é um 'encerramento' para um SaaS em evolução constante?",adaptacao:"Adapte o conceito de fase/release como proxy de projeto. Cada release major tem seus próprios artefatos mínimos de iniciação, planejamento e encerramento."},{area:"Ambientes de alta incerteza",desc:"When you don't know what you don't know, scope definition é ficção. Planejar com detalhe o que você não pode saber é desperdiçar tempo que deveria ir para descoberta.",adaptacao:"Use Rolling Wave Planning: planeje o próximo horizonte em detalhe (próximos 2 sprints), esboce o horizonte médio (próximas 6 semanas) e defina só a direção para além disso."}],tailoring_na_pratica:[{titulo:"Startup de 5 pessoas",artefatos_minimos:["Uma página de objetivo + métricas de sucesso","Backlog priorizado com top 10 bem definidos","Reunião semanal de 30min de alinhamento","Comunicação assíncrona para decisões não-urgentes"]},{titulo:"Projeto de consultoria médio (3-6 meses)",artefatos_minimos:["Project Charter de 2 páginas","Plano de comunicação (quem, o quê, quando, como)","Risk log com top 5 riscos atualizado semanalmente","Change request formal com campo de impacto obrigatório","Status report quinzenal em formato BLUF"]},{titulo:"Projeto enterprise com múltiplos stakeholders",artefatos_minimos:["Stakeholder Register com análise de influência e interesse","WBS com dicionário para entregas principais","Communication Management Plan formal","Risk Register com EVM para projetos >6 meses","Formal acceptance criteria com assinatura"]}],stakeholder_management_guerra_politica:"Stakeholder management no PMBOK parece simples no papel: identificar, planejar engajamento, gerenciar, monitorar. Na prática, você está navegando em dinâmicas de poder que nenhum template captura. O Stakeholder Register não vai te dizer que o CFO e o CTO têm conflito pessoal que está se manifestando no projeto. O que funciona: combine os artefatos formais com inteligência relacional — mapas de poder informais, conversas 1:1 antes das reuniões grandes, e a consciência de que stakeholder management é um trabalho contínuo de relacionamento, não uma etapa do projeto."};const PROJETO_DE_VERDADE={abertura:"Você não tem um projeto. Você tem caos operacional fantasiado de projeto. E isso não é crítica — é diagnóstico. Veja os sinais.",sinais_caos:["O objetivo muda dependendo de quem você pergunta","Ninguém consegue responder 'qual o critério de sucesso?' sem hesitar","O backlog tem 200 itens, todos com prioridade alta, nenhum com critério de aceite","Há um sponsor 'aprovador' que nunca aparece nas reuniões","Cada reunião de alinhamento reconstrói o que foi decidido na anterior","O time não sabe o que vai fazer na semana que vem","A data de entrega é uma pressão sem fundamento técnico","Mudanças de escopo acontecem por WhatsApp sem documentação"],sinais_saudavel:["Há uma pessoa que pode dizer 'sim' ou 'não' e isso vale","O objetivo de negócio está em uma frase que todos concordam","O backlog tem no máximo 10 itens bem definidos para as próximas 2 sprints","Mudança de escopo tem um processo e um custo visível","O time sabe o que está fazendo e por quê","Status do projeto é comunicado sem ser perguntado","Critério de aceite existe antes do dev começar"],framework_diagnostico:{titulo:"O teste dos 5 minutos",desc:"Pegue qualquer pessoa do projeto — cliente, dev, stakeholder — e pergunte as 5 perguntas abaixo. Se as respostas divergirem, você tem caos. Se convergirem, você tem projeto.",perguntas:["Qual é o objetivo principal desse projeto?","Qual é a maior entrega das próximas 2 semanas?","Quem pode aprovar uma mudança de escopo significativa?","Qual é o maior risco atual?","O que exatamente precisa acontecer para esse projeto ser considerado bem-sucedido?"]}};const OPEN_SOURCE_INFO={tagline:"DECODED é um projeto open source de autoridade profissional em gestão de tecnologia.",github:{url:"https://github.com/jessicamariano/decoded-gp",estrutura:[{path:"README.md",desc:"Manifesto, quick start, badges, casos de uso, como contribuir"},{path:"CHANGELOG.md",desc:"Histórico de versões seguindo Keep a Changelog"},{path:"CONTRIBUTING.md",desc:"Como contribuir com novos termos, cenários e correções"},{path:"LICENSE",desc:"Creative Commons BY-NC-SA 4.0 — livre para uso não-comercial com atribuição"},{path:"/docs/",desc:"GitHub Pages — a aplicação principal publicada"},{path:"/src/glossario/",desc:"Termos técnicos em JSON por categoria"},{path:"/src/operacional/",desc:"Cenários, troubleshooting, war room"},{path:"/src/pmbok8/",desc:"Termos e aplicações do PMBOK 8"},{path:"/src/cultura/",desc:"Cultura tech, maturidade, comparações"}]},como_contribuir:["Fork o repositório","Crie uma branch: git checkout -b feat/novo-termo","Adicione seu conteúdo seguindo o schema de termos existente","Abra um Pull Request com descrição clara do que foi adicionado","Aguarde revisão — PR sem critério de aceite não será mergeado"],roadmap:[{versao:"v5.0",status:"atual",desc:"Fase 02 — camada operacional, incidentes, maturidade, executivo"},{versao:"v6.0",status:"planejado",desc:"Modo mobile-first + PWA instalável"},{versao:"v7.0",status:"planejado",desc:"Sistema de busca semântica com embeddings"},{versao:"v8.0",status:"futuro",desc:"Modo colaborativo — times podem adicionar cenários reais"}],contato:"Sugestões e colaborações: github.com/jessicamariano/decoded-gp/issues"};// FASE 03 — FILOSOFIA, IDENTIDADE E PROFUNDIDADE OPERACIONAL
const MANIFESTO={tese:"A maioria dos projetos de tecnologia não falha por código. Falha por desalinhamento, silêncio e decisões que ninguém assumiu.",subtese:"Tecnologia é um problema humano com interface técnica.",paragrafos:["Você entra em uma reunião de planejamento e tudo parece organizado. Há um backlog, há sprints, há cerimônias. E ainda assim, no final da sprint, nada do que importava foi entregue. Não porque o time não trabalhou. Porque ninguém parou para fazer a pergunta certa.","DECODED nasceu de uma observação repetida: os projetos que mais deram errado não falharam por problema técnico. Falharam porque alguém não disse o que pensava. Porque uma decisão ficou suspensa por semanas. Porque o cliente aprovou sem entender. Porque o dev concordou sem concordar.","Este guia não trata tecnologia como um conjunto de termos a memorizar. Trata como um ecossistema humano com linguagem própria, dinâmicas de poder invisíveis, e padrões de comportamento que antecedem — e causam — quase todo problema técnico.","Gestão de projetos em tecnologia é tradução. Entre o que o negócio quer e o que a engenharia consegue. Entre o que o cliente pede e o que ele realmente precisa. Entre o que está escrito no contrato e o que vai acontecer na realidade. Esta tradução, feita bem, é a diferença entre um projeto e um desastre."],principios:[{numero:"01",titulo:"Clareza antes de velocidade",desc:"Um projeto que começa rápido sem clareza de objetivo está apenas criando caos com eficiência. A pergunta mais cara é a que não foi feita na semana 1."},{numero:"02",titulo:"Silêncio é risco",desc:"Em qualquer reunião, o que não foi dito é mais perigoso do que o que foi. Dev que concorda sem questionar, stakeholder que aprova sem entender, PM que não escala o problema — todos criam riscos invisíveis."},{numero:"03",titulo:"Contexto cria qualidade",desc:"Dev sem contexto de negócio constrói funcionalidade. Dev com contexto constrói solução. A diferença está em quem apresentou o porquê."},{numero:"04",titulo:"O problema técnico é quase sempre o segundo problema",desc:"Quando um sistema cai, o problema real raramente é técnico. É o processo de deploy sem revisão, a feature flag não testada, a migration sem rollback. O bug é o sintoma. A causa é organizacional."},{numero:"05",titulo:"Gestão é leitura",desc:"Um GP forte não controla processos. Lê sinais. Lê o silêncio do dev. Lê a hesitação do cliente. Lê a resistência do time. E age antes que o silêncio vire crise."},{numero:"06",titulo:"Escopo infinito é falta de objetivo",desc:"Quando tudo parece prioritário, é porque ninguém definiu o que o projeto realmente resolve. Escopo infinito não é ambição — é ausência de liderança."}]};const VOCABULARIO_PROPRIO=[{termo:"Sprint Zumbi",definicao:"Sprint que continua se movendo mas não está viva. As cerimônias acontecem, os cards são movidos, mas nenhum valor real está sendo entregue. O time está ocupado, não produtivo.",sinais:["Cards movidos para 'done' sem critério claro","Daily com 'estou nisso' por mais de 3 dias","Review sem demonstração real do produto","Velocity estável mas cliente cada vez mais insatisfeito"],causa_raiz:"Ausência de Definition of Done real + backlog sem objetivo de negócio claro."},{termo:"Escopo Radioativo",definicao:"Escopo que parece inofensivo quando adicionado mas vai contaminando o projeto progressivamente. Cada 'pequena adição' altera o campo gravitacional do projeto inteiro sem que ninguém perceba até ser tarde.",sinais:["'É só uma coisinha' repetido mais de 3 vezes no mesmo projeto","Estimativas crescendo a cada sprint sem novo escopo declarado","Time cada vez mais lento sem causa técnica aparente","Ninguém consegue mais dizer o que o projeto resolve em uma frase"],causa_raiz:"Ausência de change control + sponsor que não diferencia pedido de requisito."},{termo:"Débito Organizacional",definicao:"O acúmulo de decisões adiadas, conversas evitadas, alinhamentos falsos e documentações nunca feitas. Assim como débito técnico, paga juros. E os juros são reuniões intermináveis, retrabalho, e times que perdem confiança.",sinais:["Mesma discussão acontecendo pela terceira vez","Decisão que 'todo mundo sabia' mas ninguém documentou","Onboarding de novo dev levando semanas por falta de documentação","Contexto vital existindo só na cabeça de uma pessoa"],causa_raiz:"Cultura que valoriza velocidade de execução sem investir em transferência de conhecimento."},{termo:"Alinhamento Fantasma",definicao:"Quando todos saem de uma reunião achando que estão alinhados — mas cada um entendeu algo diferente. Ninguém discordou porque ninguém perguntou de forma específica o suficiente.",sinais:["Reunião de alinhamento que não termina com decisão documentada","'Acho que ficou claro' como encerramento","Dev entrega algo diferente do que o cliente esperava após aprovação","Múltiplas versões do 'que foi combinado' em circulação"],causa_raiz:"Perguntas abertas demais + ausência de documentação de saída de reunião."},{termo:"Roadmap Político",definicao:"Roadmap construído não pelo valor que entrega, mas pelo poder de quem pediu. Features priorizadas por hierarquia, não por impacto. O CEO mencionou uma vez — virou topo do backlog.",sinais:["Features de alto esforço e baixo impacto sempre no topo","Stakeholder sênior que 'sugeriu' virou obrigação","Times competindo por prioridade com argumentos de poder, não de dados","North Star Metric definida mas não usada para decidir nada"],causa_raiz:"Ausência de framework objetivo de priorização + cultura de hierarquia sobre dados."},{termo:"Silêncio Perigoso",definicao:"O silêncio de quem sabe que algo está errado mas não diz. Pode ser o dev que viu o bug mas não reportou, o GP que percebeu o risco mas não escalou, o cliente que percebeu o desalinhamento mas não quis criar conflito.",sinais:["Review sem perguntas ou críticas (impossível se genuíno)","'Tudo bem' repetido em dailies quando o burndown diz o contrário","Time que não levanta impedimentos mas entrega menos","Problema descoberto pelo cliente que o time já conhecia"],causa_raiz:"Cultura de punição por reportar problemas + ausência de segurança psicológica."},{termo:"Arquitetura Frágil",definicao:"Sistema que funciona mas não aguenta a próxima mudança. Construído para o problema de hoje, não para a realidade de amanhã. Parece robusto até que alguém toca em uma parte e tudo tremendo.",sinais:["Mudança em um módulo quebrando funcionalidade não relacionada","'Não mexe ali' como resposta padrão para algumas partes do sistema","Onboarding técnico levando semanas porque ninguém entende o todo","Estimativas dobrando progressivamente sem aumento de escopo"],causa_raiz:"Débito técnico acumulado + ausência de review de arquitetura em features novas."},{termo:"Agile Theater",definicao:"A performance do ágil sem a substância. Cerimônias que acontecem como ritual burocrático. Daily de 40 minutos. Planning sem estimativa real. Retro sem ação. Sprint sem compromisso. A forma existe; o princípio, não.",sinais:["Daily meeting virando status report para o gestor","Planning onde o time aceita tudo sem questionar","Retro com post-its bonitos e zero mudança de comportamento","Velocity sendo usada como métrica de performance individual"],causa_raiz:"Gestão que implementou o processo sem implementar a cultura + time sem segurança para ser honesto."},{termo:"GP Buffer",definicao:"O GP que funciona apenas como intermediário de informação — passa recados entre cliente e time sem adicionar análise, contexto ou proteção. Confunde ser o canal de comunicação com ser o gestor.",sinais:["GP repassa mensagem do cliente diretamente para o time sem filtro","Time recebe pressão diretamente sem mediação","GP não consegue responder 'qual o risco do projeto esta semana?' sem consultar alguém","Decisões sendo tomadas pelo cliente ou pelo dev — não pelo GP"],causa_raiz:"GP sem ownership do projeto + ausência de modelo mental de gestão."},{termo:"Herói Tóxico",definicao:"O profissional que resolve tudo, sabe tudo, é insubstituível — e isso é um problema, não um elogio. O herói não transfere conhecimento, não documenta, não forma. Cria dependência. Quando sai, leva o projeto junto.",sinais:["'Chama o Pedro' como resposta padrão para qualquer problema","Sistema ou módulo que só uma pessoa sabe mexer","Onboarding impossível sem a presença do 'especialista'","Time que para de funcionar durante férias de uma pessoa"],causa_raiz:"Cultura que valoriza indispensabilidade ao invés de replicabilidade + ausência de documentação sistemática."}];const VERDADES_DESCONFORTAVEIS=[{verdade:"Velocity alta não significa produto saudável.",contexto:"Um time pode entregar 60 story points por sprint e estar construindo a coisa errada, acumulando débito técnico, e deixando o cliente cada vez mais insatisfeito. Velocity mede o quanto o time trabalha. Não mede valor entregue.",implicacao:"Se você usa velocity como indicador de saúde do projeto sem combinar com NPS, customer satisfaction, bug rate e change failure rate — está medindo atividade, não resultado.",pergunta_incisiva:"Nos últimos 3 meses de alta velocity, o produto ficou mais útil para o usuário ou apenas maior?"},{verdade:"Nem toda prioridade é prioridade.",contexto:"Em ambientes onde tudo é urgente, nada é urgente. A palavra 'prioridade' perdeu o significado quando foi democratizada para cada solicitação de cada stakeholder. Se você tem 20 prioridades, não tem nenhuma.",implicacao:"Prioridade real tem custo declarado: 'para priorizar X, estamos despriorizando Y'. Sem esse custo explícito, a palavra é política, não gestão.",pergunta_incisiva:"Se você precisasse cortar 50% do backlog hoje, o que sobraria? Esse é o seu projeto real."},{verdade:"Às vezes o problema não é técnico. É ego.",contexto:"A decisão de arquitetura que ninguém questiona porque o Tech Lead propôs. A solução que ninguém descarta porque o CTO mencionou. A feature que entra no MVP porque o founder quer ver. Ego decide mais do que dados na maioria das empresas.",implicacao:"Um GP que não consegue identificar quando ego está dirigindo uma decisão técnica vai gestionar consequências que não entende. O bug não estava no código — estava na reunião de planejamento.",pergunta_incisiva:"Qual foi a última decisão técnica do projeto que foi contestada por dados ao invés de autoridade?"},{verdade:"Roadmap pode ser teatro.",contexto:"Roadmap construído para parecer estratégico ao invés de ser estratégico. Trimestres cheios de features sem conexão com objetivo de negócio. Datas que todos sabem que são fictícias mas ninguém questiona publicamente.",implicacao:"Um roadmap que ninguém está usando para tomar decisões não é um instrumento de gestão — é um artefato político. Serve para responder quando perguntado, não para guiar quando necessário.",pergunta_incisiva:"Quando foi a última vez que o roadmap foi usado para recusar um pedido de escopo?"},{verdade:"Cerimônia não resolve desorganização.",contexto:"Você pode implementar Scrum perfeito em uma organização sem cultura de responsabilidade e o resultado será: daily de 40 minutos, planning de 6 horas, retro com post-its que ninguém age, e sprint que entrega metade. O processo sem a cultura é palco sem peça.",implicacao:"Antes de implementar mais processo, diagnostique o problema. Se o time não tem clareza de objetivo, nenhuma cerimônia vai criar. Se não existe segurança psicológica, nenhuma retro vai gerar honestidade.",pergunta_incisiva:"Se você removesse todas as cerimônias ágeis amanhã, o que mudaria de verdade no projeto?"},{verdade:"Time ocupado não é time eficiente.",contexto:"Ocupação é métrica de atividade. Eficiência é métrica de resultado. Um dev pode estar trabalhando 10 horas por dia em retrabalho, reuniões desnecessárias e features sem critério de aceite claro. Está ocupado. Não está gerando valor.",implicacao:"Quando o time diz 'estamos sobrecarregados', a pergunta correta não é 'como trabalhamos mais?'. É 'o que estamos fazendo que não devíamos?'",pergunta_incisiva:"De todo o trabalho do time esta semana, quanto foi para o cliente e quanto foi para compensar desorganização interna?"},{verdade:"Muitas empresas confundem caos com agilidade.",contexto:"'Somos ágeis' se tornou justificativa para ausência de processo, falta de documentação, mudança constante de prioridade e ausência de planejamento. Agilidade real é responsividade a mudanças dentro de um sistema saudável. Caos disfarçado de agilidade é responsividade a pedidos sem sistema nenhum.",implicacao:"Quando alguém diz 'somos ágeis, não precisamos documentar', é sinal de alerta. Agilidade não é inimiga de documentação — é inimiga de documentação excessiva.",pergunta_incisiva:"O que nessa empresa é agilidade real e o que é ausência de disciplina chamada de agilidade?"},{verdade:"Ter backlog não significa ter estratégia.",contexto:"Backlog é uma lista. Estratégia é um ponto de vista sobre o futuro. Você pode ter 500 itens no backlog sem nenhuma ideia de onde o produto está indo. Backlog sem North Star é acúmulo de pedidos.",implicacao:"O backlog deve ser uma manifestação da estratégia do produto. Se você embaralhar aleatoriamente os itens do backlog e ninguém perceber diferença na direção do produto — não há estratégia.",pergunta_incisiva:"Se você somasse todas as features do backlog e o produto ficasse pronto, qual problema de negócio estaria resolvido?"}];const PSICOLOGIA_ORG=[{perfil:"O dev que concorda com tudo",emoji:"🎭",aparencia:"Parece colaborativo. Nunca cria atrito. Sempre diz 'sim'. Estimativas aceitas, escopo aceito, prazo aceito.",realidade:"Ou está com medo de conflito, ou desistiu de ser ouvido, ou não entende o suficiente para questionar. O 'sim' automático não é acordo — é abdição.",risco_real:"Você acha que tem alinhamento. Não tem. Na review, a entrega vai ser diferente do esperado. O dev construiu o que entendeu, não o que foi combinado.",o_que_fazer:"Substitua perguntas abertas por perguntas específicas: 'Como você vai implementar X?' ao invés de 'Você entendeu X?' A segunda convida o 'sim'. A primeira revela o entendimento real.",sinal_de_alerta:"Reunião de planning sem nenhuma pergunta do dev sobre uma tarefa nova e complexa."},{perfil:"O stakeholder que nunca decide",emoji:"🫠",aparencia:"Está sempre disponível. Participa de todas as reuniões. Dá muito feedback. Mas quando precisa de uma decisão — desaparece atrás de 'deixa eu verificar', 'preciso consultar', 'vamos avaliar'.",realidade:"Decisão é responsabilidade. Quem não decide não assume risco. Pode ser insegurança, pode ser conflito político interno, pode ser falta de clareza sobre o que deve decidir.",risco_real:"Projeto paralisado esperando decisão que nunca vem. Prazo consumido por standby. Time desmotivado pela falta de direção.",o_que_fazer:"Torne o custo da indecisão visível: 'Cada semana sem essa decisão impacta N dias de prazo. Podemos agendar 20 minutos na quinta?' Force uma janela, não apenas solicite.",sinal_de_alerta:"Mesma decisão pendente por mais de 2 semanas sem escalonamento."},{perfil:"O PM que mascara risco",emoji:"🎩",aparencia:"Status sempre 'verde'. Update sempre positivo. Riscos mencionados brevemente e minimizados. 'Estamos ok, pequenos ajustes'.",realidade:"Medo de parecer incompetente. Pressão de mostrar controle. Cultura que pune quem traz problema ao invés de recompensar quem o antecipa.",risco_real:"Stakeholders tomando decisões baseadas em informação otimista que não reflete a realidade. Quando a crise chega, chega como surpresa — muito mais custosa do que se tivesse sido escalada antes.",o_que_fazer:"Crie cultura de 'amber é valioso'. Um projeto que mostra amarelo frequentemente e resolve é mais maduro do que um projeto sempre verde que explode. O vermelho só surpreende quando o amarelo foi ignorado.",sinal_de_alerta:"Projeto com status 'verde' por 4+ semanas seguidas na fase de execução intensiva."},{perfil:"O squad que parece produtivo mas não entrega valor",emoji:"⚙️",aparencia:"Velocity alta. Board cheio de cards 'done'. Reuniões acontecendo. Todos ocupados.",realidade:"Produção de atividade sem produção de resultado. Features entregues que ninguém usa. Bugs corrigidos que ninguém reportou. Métricas de produto estagnadas.",risco_real:"Empresa investindo em execução sem retorno. Recurso escasso (tempo de engenharia) sendo consumido sem criação de valor mensurável.",o_que_fazer:"Introduza métricas de resultado ao lado de métricas de atividade. 'Entregamos X features' junto com 'X features resultaram em Y impacto'. Se o Y é sempre vazio, o problema não é de execução.",sinal_de_alerta:"Trimestre de alta entrega técnica com métricas de produto (engagement, conversion, retention) estagnadas."},{perfil:"O time que evita conflito",emoji:"🕊️",aparencia:"Time harmônico. Sem desentendimentos visíveis. Retros positivas. Todos concordam.",realidade:"Conflito evitado não é conflito resolvido — é conflito adiado com juros. Ambiente sem tensão saudável não cria inovação, não gera melhoria, não produz qualidade real.",risco_real:"Decisões ruins não são contestadas. Riscos não são nomeados. Problemas crescem em silêncio até explodir em crise.",o_que_fazer:"Diferencie conflito destrutivo (pessoal, emocional) de conflito produtivo (de ideias, de abordagens). Incentive ativamente o segundo. 'Alguém discorda? Por quê?' não é ameaça — é gestão.",sinal_de_alerta:"Retro ou planning sem nenhum ponto de tensão ou discordância saudável."},{perfil:"A empresa que usa agilidade para mascarar desorganização",emoji:"🏚️",aparencia:"'Somos ágeis.' Sem documentação formal. Planejamento 'emergente'. Prioridade 'flexível'. Processo 'leve'.",realidade:"Agilidade como desculpa institucionalizada. Cada ausência de estrutura justificada como escolha metodológica. O que seria negligência em outro contexto é 'agilidade' aqui.",risco_real:"GP novo entra e não consegue entender o estado do projeto. Cliente não consegue prever. Time não sabe o que vai fazer na semana que vem. Tudo é fluido porque ninguém estabeleceu o sólido.",o_que_fazer:"Agilidade real tem fundamentos sólidos: objetivo claro, critério de aceite, definição de pronto, processo de mudança. O que é 'leve' é a burocracia — não a responsabilidade.",sinal_de_alerta:"Não existe nenhum artefato de projeto que uma pessoa de fora poderia ler para entender o estado atual."}];const GUERRA_REAL=[{id:"sexta-deploy",hora:"Sexta-feira, 18h42",setup:"O deploy da v3.1.0 acabou de ser executado. Em 6 minutos, o Slack começa: 'checkout retornando 500'. 'API de pedidos fora'. 'cliente ligou reclamando'. Você está saindo de uma reunião. O Tech Lead está no trânsito. O DevOps está em outro fuso horário. O dev que fez o deploy principal está desconectado.",tensao:"O cliente é um e-commerce médio. É sexta à noite. Amanhã é sábado. Não existe plantão formal.",leitura_correta:"Isso é um incidente de severidade 1. Cada minuto de checkout fora do ar é pedido perdido. A ausência de plantão formal não é argumento — é risco que se materializou.",gp_junior:"Envia mensagem no grupo geral perguntando 'alguém viu o que aconteceu?'. Espera resposta. Tenta encontrar quem está disponível. 25 minutos depois, ainda sem resposta organizada.",gp_senior:"Em 3 minutos: (1) abre canal #incidente-18h42-sexta, (2) posta: 'CHECKOUT DOWN. Alguém com acesso aos logs disponível AGORA?', (3) manda mensagem direta para o Tech Lead e o DevOps simultaneamente, (4) começa rascunho de comunicação para o cliente.",decisoes_criticas:["Rollback imediato (arriscado se houver migration de banco — pode perder dados) vs. hotfix rápido (mais lento, mas seguro)","Comunicar o cliente agora com informação parcial vs. esperar ter ETA para comunicar com mais detalhes","Acionar suporte fora do horário (custo político) vs. deixar o sistema fora do ar até segunda (custo financeiro e de confiança)"],comunicacao_correta:"'[Nome], identificamos uma instabilidade no checkout desde às 18h42. Nosso time está atuando. Próxima atualização em 20 minutos.' — Curto, factual, com tempo de próxima atualização.",erros_fatais:["Esperar o dev que fez o deploy aparecer antes de acionar o protocolo","Tentar resolver sozinho sem acionar o time","Não comunicar o cliente nas primeiras meia hora","Prometer resolução sem base técnica ('vai estar resolvido em 30 minutos')"],resolucao:"O incidente durou 2h12. O rollback não foi possível por causa da migration. Hotfix foi feito. O cliente recebeu 4 updates durante o incidente. Na segunda, postmortem agendado. Resultado: cliente satisfeito com a gestão do incidente, insatisfeito com o deploy sem smoke test."},{id:"cliente-direto-dev",hora:"Terça-feira, 14h23",setup:"Você descobre, por acidente, que o cliente tem estado se comunicando diretamente com o dev sênior do projeto há 2 semanas. Pedidos de feature, ajustes de prioridade, sugestões técnicas — tudo bypassing você. O dev não te contou. O cliente não te contou. Você descobre por uma mensagem acidental no Slack.",tensao:"O dev está implementando uma feature nova que não passou por análise de impacto. O cliente acha que 'já está combinado'. Você está fora da equação.",leitura_correta:"Isso não é traição — é ausência de processo. O cliente foi ao dev porque é mais fácil. O dev aceitou porque quer ser útil. O processo que permitiu isso não existe ou não está funcionando. A culpa é estrutural, não individual.",gp_junior:"Enfrenta o dev com 'por que você não me contou?'. Manda e-mail formal para o cliente reclamando do canal. Cria conflito sem resolver o problema estrutural.",gp_senior:"(1) Conversa privada com o dev: 'Percebi que você está recebendo pedidos diretamente. Preciso entender o que aconteceu. Você pode me atualizar?' — sem acusação, (2) Conversa com o cliente: 'Quero garantir que você sempre tenha resposta rápida. Vamos criar um canal oficial para isso?' — sem constrangimento, (3) Implementa processo de single point of contact.",decisoes_criticas:["A feature que o dev já começou: parar (cria atrito com o dev e o cliente) ou finalizar com análise de impacto retroativa?","Comunicar ao gestor do projeto que o processo falhou vs. resolver internamente?"],comunicacao_correta:"Com o dev: 'Obrigada por tentar ajudar. Precisamos alinhar o fluxo para que eu possa proteger você de pedidos que podem mudar o escopo sem aviso.' Com o cliente: 'Para agilizar a comunicação e garantir que nada se perca, vamos centralizar pedidos aqui.'",erros_fatais:["Criar conflito pessoal quando o problema é de processo","Ignorar e deixar acontecer novamente","Confrontar publicamente qualquer das partes"],resolucao:"A feature foi concluída com análise de impacto retroativa (2 dias extras). O canal de comunicação foi formalizado. O dev passou a filtrar pedidos diretos. O cliente entendeu o valor do processo quando uma solicitação dele foi analisada e identificado um conflito de escopo antes de ser desenvolvida."},{id:"estimativa-triplicou",hora:"Segunda-feira, 10h15",setup:"Planning da sprint 8. O Tech Lead apresenta a estimativa para o módulo de integração com o ERP que o cliente espera para a sprint 10: 34 story points. Na sprint 2, havia sido estimado em 8 pontos. Com velocity de 20 pontos/sprint, 34 pontos é quase 2 sprints inteiras. O cliente tem evento de lançamento marcado para a semana da sprint 10.",tensao:"O cliente não sabe da mudança de estimativa. O contrato tem data. O time de vendas prometeu. Você está no planning vendo a estimativa triplicar.",leitura_correta:"A estimativa de 8 pontos na sprint 2 foi baseada em desconhecimento. A realidade técnica foi descoberta com o projeto em andamento. Isso não é culpa — é o custo da incerteza não declarada na estimativa original.",gp_junior:"Pede para o Tech Lead 'ver se dá para fazer em menos'. Tenta comprimir a estimativa. Não comunica o cliente. Torcendo para o time 'dar um jeito'.",gp_senior:"(1) Não questiona a estimativa do Tech Lead publicamente — confia no expertise técnico, (2) Imediatamente após o planning, analisa as opções: o que pode ser cortado do escopo da integração para caber no prazo?, (3) Agenda chamada com o cliente para esta semana — não para a semana do problema, (4) Apresenta ao cliente: escopo original vs. escopo real, opções para resolver.",decisoes_criticas:["Reduzir escopo da integração para caber no prazo (entrega parcial no prazo) vs. manter escopo e estender prazo","Comunicar o cliente antes de ter solução (proativo, mas sem resposta) vs. depois de ter solução (mais lento, mas com proposta)"],comunicacao_correta:"'[Nome], ao detalharmos tecnicamente a integração com o ERP, identificamos que a complexidade é maior do que a estimativa inicial capturou. Quero te apresentar as opções antes de definirmos o caminho. Podemos falar amanhã?' — Proativo, transparente, sem entrar em pânico.",erros_fatais:["Comprimir estimativa técnica por pressão de prazo","Descobrir o problema na sprint 10 ao invés da sprint 8","Prometer ao cliente o prazo original sem base"],resolucao:"O cliente optou por reduzir escopo da integração para caber no prazo, com a fase 2 agendada para o trimestre seguinte. O lançamento aconteceu no prazo com integração parcial. A conversa difícil na sprint 8 evitou uma crise na sprint 10."},{id:"tech-lead-conflito",hora:"Quarta-feira, 16h00",setup:"Reunião de refinamento. O cliente propõe uma abordagem técnica baseada em algo que ele leu num artigo. O Tech Lead discorda educadamente. O cliente insiste. O Tech Lead discorda de forma mais firme. O cliente, que é CTO da empresa do cliente, começa a questionar a competência do Tech Lead. A tensão é palpável. O Tech Lead fica em silêncio. Você está facilitando a reunião.",tensao:"Conflito de ego técnico. CTO externo vs. Tech Lead interno. Em campo neutro (a reunião) que você está mediando.",leitura_correta:"O CTO do cliente tem poder hierárquico mas não tem contexto técnico do sistema. O Tech Lead tem contexto mas não tem habilidade política de navegar essa dinâmica. Você não tem conhecimento técnico para julgar quem está certo. Mas tem responsabilidade de gerir o ambiente.",gp_junior:"Fica em silêncio esperando resolver sozinho. Ou concorda com o cliente porque tem poder. Ou tenta defender o Tech Lead criando conflito maior.",gp_senior:"Interrompe com: 'Quero garantir que tomemos a melhor decisão aqui. [Tech Lead], pode documentar as duas abordagens com os trade-offs de cada uma? Podemos revisar assíncrono antes da próxima reunião?' — Descomprime o conflito, cria espaço para a decisão técnica ser feita com qualidade.",decisoes_criticas:["Proteger o Tech Lead publicamente (cria atrito com cliente poderoso) vs. deixar o Tech Lead ser atropelado (destrói confiança e autoridade técnica interna)","Tomar decisão técnica agora (sob pressão emocional) vs. adiá-la para análise mais calma"],comunicacao_correta:"Para o CTO do cliente (em particular, após a reunião): 'Quero garantir que a decisão técnica seja a melhor possível para o projeto. Nosso Tech Lead vai documentar as opções para sua análise. Sua experiência vai enriquecer muito a avaliação.'",erros_fatais:["Forçar decisão técnica em ambiente de conflito emocional","Escolher um lado publicamente","Ignorar a tensão esperando que se resolva sozinha"],resolucao:"O Tech Lead documentou as duas abordagens. O CTO do cliente, ao ler a análise técnica detalhada, recuou da sua posição inicial. A abordagem do Tech Lead foi adotada. O conflito virou respeito mútuo quando o contexto técnico ficou claro fora do ambiente de pressão."}];const ANTIPADROES=[{nome:"Tudo é Urgente",emoji:"🚨",descricao:"Ambiente onde toda solicitação chega com urgência máxima. 'Urgente' perdeu o significado. O time está em modo reativo permanente.",sintomas:["'Urgente' em todo e-mail independente do assunto","Prioridades mudando com frequência semanal ou menor","Time sem capacidade de planejar além de 2 dias","Backlog organizado por data de chegada, não por valor"],consequencias:["Burnout progressivo do time","Qualidade sacrificada por velocidade constante","Decisões ruins tomadas sob pressão artificial","Perda de confiança do time na liderança"],como_sobreviver:["Implante matriz de urgência × impacto com o cliente","'Para tudo ser urgente, nada é urgente' — mostre o custo da urgência falsa","Crie SLA de resposta: urgência real = hoje, alta = amanhã, normal = esta semana","Documente cada troca de prioridade com impacto no prazo"]},{nome:"Dependência de Heróis",emoji:"🦸",descricao:"Sistema que funciona porque uma ou duas pessoas salvam tudo. O herói não tira férias tranquilo. O herói não documenta. O projeto não sobrevive sem o herói.",sintomas:["'Chama o [nome]' como resposta padrão","Módulo que só uma pessoa sabe mexer","Ausência de documentação nos pontos críticos","Cobertura de plantão impossível"],consequencias:["Risco de negócio quando o herói sai ou adoece","Impossibilidade de escalar o time","Herói sobrecarregado e ressentido a longo prazo","Conhecimento crítico não transferível"],como_sobreviver:["Implante 'bus factor' como métrica: quantas pessoas precisam sair para o projeto parar?","Pair programming e revisão de código como política de transferência","Documentation sprint: uma sprint por trimestre só para documentar o crítico","Não elogie indispensabilidade — elogie replicabilidade"]},{nome:"Ninguém Decide",emoji:"🫥",descricao:"Ambiente onde decisões ficam suspensas indefinidamente. Comitês sem líder. Aprovações que precisam de aprovações. Escalação circular.",sintomas:["Reunião que termina sem decisão documentada","'Deixa eu verificar' como resposta padrão","Mesmo ponto revisitado em múltiplas reuniões","Projetos paralisados por aprovação pendente"],consequencias:["Prazo consumido por espera, não por trabalho","Time em standby desmotivado","Oportunidades de mercado perdidas pela lentidão","GP em modo de gerenciamento de fila ao invés de gestão"],como_sobreviver:["Mapeie quem tem autoridade de decisão para cada tipo de questão — e documente","'Se não houver decisão até [data], seguiremos com [opção padrão]' — decida por omissão","Torne o custo da indecisão visível em dias de prazo e custo financeiro","Escale mais rápido do que parece necessário"]},{nome:"Retrabalho Crônico",emoji:"🔄",descricao:"Ambiente onde as mesmas coisas são feitas duas ou três vezes. Feature reescrita porque o requisito mudou. Bug corrigido que volta. Design aprovado que é reprovado na entrega.",sintomas:["'Isso já foi feito antes' repetido frequentemente","Features sendo revisadas depois de 'aprovadas'","Mesmo bug aparecendo em variações diferentes","Estimativas que nunca capturam o real porque sempre há uma volta"],consequencias:["Velocity aparente alta mas entrega real baixa","Time que perde a confiança no processo","Margem consumida por retorno ao invés de progresso","Cliente insatisfeito mesmo com time muito ocupado"],como_sobreviver:["Implante critério de aceite obrigatório antes de qualquer desenvolvimento começar","Revisão de design/solução com stakeholder real antes do dev começar — não depois","Measure cycle time e lead time: o retrabalho vai aparecer no dado","Postmortem para cada ciclo de retrabalho > 1 sprint: o que criou a necessidade de refazer?"]}];const MODELOS_MENTAIS=[{modelo:"Como pensar risco",subtitulo:"Risco não é o que pode dar errado. É o produto de probabilidade × impacto × tempo de detecção.",explicacao:"A maioria dos GPs pensa risco como lista. 'Pode dar errado X, Y, Z.' O pensamento maduro sobre risco é matricial: qual a probabilidade?, qual o impacto se acontecer?, quanto tempo leva para detectar que aconteceu? Um risco de baixa probabilidade mas impacto catastrófico e detecção tardia (exemplo: bug de segurança) precisa de mais atenção do que risco de alta probabilidade mas baixo impacto e detecção rápida.",aplicacao:"Antes de apresentar um risco para um stakeholder, responda as três dimensões. 'Existe risco de atraso' não é suficiente. 'Existe 70% de probabilidade de atraso de 2 semanas se a integração com o ERP não tiver sandbox disponível — e só vamos saber na sprint 8' é gestão.",pegunta_teste:"Para cada risco no seu RAID log: você sabe a probabilidade, o impacto em dias/reais, e quando vai saber se está acontecendo?"},{modelo:"Como pensar dependência",subtitulo:"Dependência não gerenciada é prazo perdido esperando.",explicacao:"Dependências são as causas mais frequentes de projetos que 'parecem estar indo bem até parar'. Uma dependência externa (API de parceiro, aprovação de área, ambiente de QA) tem risco inerente que não é controlável pelo GP. O que é controlável: identificar cedo, acionar cedo, criar alternativas (mock, workaround, timeline paralela).",aplicacao:"Para cada sprint, pergunte: 'Qual item tem dependência que não está no nosso controle?' Esses itens precisam de ação proativa — não reativa. A dependência descoberta na semana que bloqueia é planejamento com falha.",pegunta_teste:"Qual dependência do seu projeto atual pode bloquear a entrega nas próximas 4 semanas? Você já acionou quem resolve?"},{modelo:"Como pensar custo de atraso",subtitulo:"Prazo não é uma data. É um custo de negócio por unidade de tempo.",explicacao:"Quando um stakeholder pressiona por prazo, raramente está pensando em custo de atraso. E raramente o GP está calculando. Custo de atraso = valor de negócio que não está sendo gerado por unidade de tempo (semana, mês). Uma feature que reduz churn em 2% num produto de R$10M de MRR tem custo de atraso de ~R$200k/mês. Esse número muda completamente a conversa de priorização.",aplicacao:"Para cada feature no backlog, pergunte: 'Quanto custa cada semana sem isso?' Se a resposta for 'não sei', você não tem dado para priorizar — você tem opinião.",pegunta_teste:"Qual feature do seu backlog tem o maior custo de atraso calculado? Ela está no topo do backlog?"},{modelo:"Como pensar trade-offs",subtitulo:"Todo trade-off explícito é uma decisão. Todo trade-off implícito é um risco.",explicacao:"Quando o time decide fazer uma feature rápido aceitando débito técnico, há um trade-off: velocidade agora por lentidão futura. Se esse trade-off é explícito (documentado, comunicado, aceito conscientemente), é uma decisão adulta. Se é implícito (aconteceu sem que ninguém falasse), é um risco que vai aparecer mais tarde como 'o sistema ficou mais lento' — sem que ninguém consiga explicar por quê.",aplicacao:"Toda decisão de prazo que envolve qualidade, escopo ou arquitetura deve ter o trade-off documentado. 'Decidimos fazer X aceitando o custo Y, que vai se manifestar como Z no futuro.' Esse registro é o que diferencia decisão consciente de negligência.",pegunta_teste:"Quais os últimos 3 trade-offs do seu projeto? Eles estão documentados? Quem sabe que foram feitos?"}];const DECISOES_DIFICEIS=[{dilema:"Qualidade vs. Prazo",cenario:"A sprint 9 termina amanhã. O módulo de pagamento está funcional mas sem testes automatizados. O cliente tem evento de lançamento em 2 dias. O Tech Lead estima que os testes levariam mais 3 dias. Sem testes, o risco de regressão é real mas não mensurável.",opcoes:[{escolha:"Entregar sem testes",pros:["Prazo mantido","Evento do cliente acontece","Pressão do cliente satisfeita"],contras:["Risco técnico real de regressão em produção","Débito de testes que provavelmente nunca será pago","Sinal cultural de que qualidade é negociável sob pressão"]},{escolha:"Atrasar 3 dias para incluir testes",pros:["Sistema mais seguro","Precedente de qualidade não negociável","Testes existem para evoluções futuras"],contras:["Evento do cliente impactado","Pressão política significativa","Cliente pode questionar se valeu a pena a demora"]}],decisao_madura:"Apresente o risco quantificado ao cliente: 'Sem testes, temos risco de regressão em produção. Se acontecer no evento, o impacto é X. Posso entregar em 3 dias com testes ou amanhã sem. Qual risco você aceita?' A decisão é do cliente — mas precisa ser informada.",impacto_invisivel:"A decisão de entregar sem testes não é só técnica. É cultural. Toda vez que qualidade é negociada sob pressão, o time aprende que qualidade é opcional. Esse aprendizado se acumula.",leitura_executiva:"Qualidade não defendida não existe como valor — existe como aspiração. Defender qualidade com dados (custo de incidente > custo de 3 dias) é liderança técnica."},{dilema:"Agradar Stakeholder vs. Proteger Time",cenario:"O cliente quer fazer retrospectiva com o time e com ele presente para dar feedback 'construtivo'. O Tech Lead te avisa privadamente que o time está desconfortável — há medo de punição por honestidade. Você precisa responder ao cliente.",opcoes:[{escolha:"Aceitar a presença do cliente na retro",pros:["Cliente sente que está participando","Feedback do cliente chega diretamente"],contras:["Retro perde função: time não vai ser honesto","Você perde uma ferramenta crítica de melhoria","Precedente de invasão do espaço seguro do time"]},{escolha:"Recusar educadamente e propor alternativa",pros:["Retro mantém sua função","Time se sente protegido","Processo íntegro"],contras:["Cliente pode se sentir excluído","Requer habilidade política para comunicar sem criar atrito"]}],decisao_madura:"'Entendo seu interesse em estar próximo do time. Nosso formato de retrospectiva é para o time processar o processo interno — eu serei o canal de feedback relevante para você. Posso agendar uma sessão separada de feedback do projeto?'",impacto_invisivel:"GP que entrega o time para o cliente para evitar conflito com stakeholder perde confiança do time permanentemente. Você não consegue reconstruir segurança psicológica depois de destruí-la.",leitura_executiva:"Proteger o espaço de trabalho do time não é criar silos — é garantir as condições para que o time funcione. Um time sem espaço seguro de retrospecção não melhora. E um time que não melhora é responsabilidade de gestão."}];const TRADUCAO_CORPORATIVA=[{disse:"Precisamos reavaliar o roadmap.",significa:"Estamos atrasados ou fora do orçamento e ninguém quer assumir a responsabilidade de comunicar diretamente.",acao_gp:"Pergunte: 'O que especificamente está te fazendo querer reavaliar agora? Qual a pressão que está chegando?'"},{disse:"Vamos ganhar velocidade.",significa:"Provavelmente vamos cortar qualidade, testes ou documentação. 'Velocidade' raramente vem de eficiência — vem de concessões.",acao_gp:"Pergunte: 'O que exatamente você espera que mude? O que pode ser sacrificado e o que não pode?'"},{disse:"O time está amadurecendo.",significa:"Ainda não temos previsibilidade consistente, mas estamos melhorando — ou pelo menos achando que estamos.",acao_gp:"Pergunte: 'Qual indicador específico mostra esse amadurecimento? Como medimos?'"},{disse:"Isso é pequeno, não vai demorar nada.",significa:"Não temos ideia real do esforço técnico envolvido. Estamos minimizando para facilitar a aprovação.",acao_gp:"Sempre peça estimativa técnica antes de qualquer comprometimento: 'Vou verificar com o time e te respondo amanhã.'"},{disse:"Temos que ser mais ágeis.",significa:"Queremos mudanças mais rápidas sem necessariamente entender o que está tornando as mudanças lentas.",acao_gp:"Pergunte: 'O que você percebe como lento hoje? Qual mudança você precisou que demorou mais do que esperava?'"},{disse:"Está tudo alinhado.",significa:"Ninguém discordou publicamente — o que é bem diferente de estar genuinamente alinhado.",acao_gp:"Documente explicitamente o que foi decidido: 'Para confirmar: ficou combinado X, Y e Z. Alguém vê algo diferente?'"},{disse:"Vamos ver como vai.",significa:"Não temos uma resposta, não queremos a responsabilidade de decidir, e estamos adiando o inevitável.",acao_gp:"Não aceite como resposta final. 'O que precisaria acontecer para ter clareza sobre isso? Qual a próxima ação?'"},{disse:"O cliente está satisfeito.",significa:"O cliente não reclamou formalmente. Satisfação real e ausência de reclamação são coisas diferentes.",acao_gp:"Meça: NPS, uso real da feature entregue, renovação contratual. Silêncio não é dado."}];const GP_FRACO_SINAIS=[{sinal:"Confunde cerimônia com gestão",desc:"Daily, planning, retro — tudo acontece. Mas o projeto não tem clareza de objetivo, o backlog é uma lista de desejos, e o GP não sabe dizer qual é o maior risco desta semana. As ferramentas existem. A gestão não.",como_identificar:"GP que, quando perguntado 'qual o estado real do projeto?', lista as cerimônias ao invés de citar dados."},{sinal:"Mascara risco para parecer competente",desc:"Status sempre verde. Problemas mencionados brevemente. 'Pequenos ajustes'. O GP acredita que trazer problema é sinal de incompetência. Não é. É o oposto.",como_identificar:"Projeto que vai de 'tudo bem' para crise sem nenhum sinal amarelo no caminho."},{sinal:"É o mensageiro, não o gestor",desc:"Repassa pedido do cliente para o dev sem filtro. Repassa problema do dev para o cliente sem contexto. Não adiciona análise, não filtra, não prioriza. É canal, não liderança.",como_identificar:"Dev e cliente se comunicam melhor sem o GP do que com ele."},{sinal:"Evita conflito a qualquer custo",desc:"Aceita escopo para não criar atrito. Não questiona estimativa para não parecer ignorante. Não escala problema para não incomodar. O resultado é projeto que colapsa em silêncio.",como_identificar:"GP que nunca disse 'não' ao cliente ou 'isso precisa mudar' para o time."},{sinal:"Foca na ferramenta, não no problema",desc:"'Vamos usar o Jira para organizar', 'vamos criar uma dashboard no Power BI', 'vamos implementar um novo processo de sprint'. A ferramenta é a resposta antes do problema ser entendido.",como_identificar:"GP que, quando o projeto está em dificuldade, sugere nova ferramenta ou novo processo ao invés de diagnosticar a causa."},{sinal:"Não tem ownership",desc:"O projeto acontece. O GP gerencia o calendário. Não há senso de 'eu sou responsável pelo resultado desse projeto'. Há gerenciamento de processo, não de entrega.",como_identificar:"Quando o projeto falha, o GP consegue explicar por que não é responsabilidade dele. Sinal claro."}];const _W=()=>{const sid=(()=>{const t=Date.now().toString(36).toUpperCase();const r=Math.random().toString(36).substring(2,6).toUpperCase();return'DCD-'+t+'-'+r;})();const dt=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});const offset=Math.floor(Math.random()*8);const rows=Array.from({length:12},(_,i)=>i);const cols=Array.from({length:6},(_,i)=>i);return/*#__PURE__*/React.createElement("div",{style:{position:'fixed',inset:0,zIndex:9990,pointerEvents:'none',overflow:'hidden',mixBlendMode:'difference'}},rows.map(i=>/*#__PURE__*/React.createElement("div",{key:i,style:{position:'absolute',top:i*9+offset-4+'%',left:'-20%',width:'140%',display:'flex',gap:110,transform:'rotate(-16deg)',whiteSpace:'nowrap',opacity:0.010}},cols.map(j=>/*#__PURE__*/React.createElement("span",{key:j,style:{fontFamily:'IBM Plex Mono,monospace',fontSize:11,color:'#FFFFFF',letterSpacing:'0.07em',userSelect:'none',fontWeight:500}},"DECODED \xB7 Jessica Mariano \xB7 ",dt," \xB7 ",sid)))));};const TECH_FUNDAMENTOS={oQueELinguagem:{tecnico:"Uma linguagem de programação é um sistema formal de instruções que permite a humanos comunicar operações a um computador. Define sintaxe (como escrever), semântica (o que significa) e um conjunto de abstrações para manipular dados, controlar fluxo e interagir com sistemas.",simples:"É o idioma que você usa para conversar com o computador. Assim como português tem gramática e vocabulário, cada linguagem tem suas regras e palavras-chave. O computador só entende zeros e uns — a linguagem é a tradução entre o que humanos pensam e o que a máquina executa.",analogia:"Pense em uma receita de bolo. A linguagem é o idioma em que a receita está escrita. O framework é o livro de receitas com estrutura pronta. A biblioteca é um ingrediente específico já preparado (como um molho pronto). Você pode fazer o bolo sem o livro e sem o molho pronto — mas vai demorar mais.",porQueVarias:"Cada linguagem foi criada para resolver um problema específico de uma época específica. Python nasceu para simplicidade e ciência. JavaScript nasceu para o browser. Java nasceu para rodar em qualquer lugar. Não existe linguagem universal porque não existe problema universal.",impactoGP:["A escolha da linguagem afeta diretamente quem você pode contratar — e por quanto.","Linguagens mais populares têm mais devs disponíveis, mais documentação e mais soluções prontas.","Linguagem errada para o contexto = dívida técnica desde o sprint 1.","Um GP não precisa saber programar. Precisa saber fazer as perguntas certas sobre a escolha."],diferenca:{linguagem:"As regras do jogo. JavaScript, Python, Java.",framework:"Um conjunto de regras pré-definidas dentro do jogo. React, Django, Spring.",biblioteca:"Uma ferramenta específica que você escolhe usar dentro do jogo. Lodash, Pandas, Axios."}},frontVsBack:{front:{definicao:"Tudo que o usuário vê e interage diretamente. Interface, botões, formulários, animações, layout.",responsabilidade:["Interface visual","Experiência do usuário","Interatividade","Performance percebida","Responsividade","Acessibilidade"],tecnologias:["HTML","CSS","JavaScript","React","Vue","Angular"],impacto_projeto:"Problemas de front são imediatamente visíveis ao usuário. Um bug de front-end pode destruir a percepção de qualidade de um produto que funciona perfeitamente por trás.",sinal_risco:"Time de front sobrecarregado com regras de negócio complexas — isso é falta de separação de responsabilidade."},back:{definicao:"Tudo que acontece no servidor: lógica de negócio, banco de dados, autenticação, integrações, processamento.",responsabilidade:["Regras de negócio","Segurança","Banco de dados","Integrações com APIs externas","Performance real","Escalabilidade"],tecnologias:["Node.js","Python","Java","PHP","Go","C#"],impacto_projeto:"Problemas de back-end podem ser invisíveis por semanas — até que explodem em produção. Dados corrompidos, falhas de segurança e gargalos de performance raramente aparecem em demo.",sinal_risco:"Back-end sem testes automatizados e sem documentação de APIs é bomba-relógio para qualquer integração futura."},juntos:"Front e back se comunicam via API — um contrato de dados. Quando esse contrato muda sem comunicação, o projeto quebra. GP precisa garantir que as duas pontas conversam sobre mudanças antes de implementar.",fullstack:"Dev fullstack trabalha nos dois lados. É valioso em times pequenos, mas tem limite de profundidade. Em produto de escala, especialização costuma entregar mais qualidade."}};const LINGUAGENS=[{id:"javascript",nome:"JavaScript",emoji:"🟡",tagline:"A linguagem da web. Onipresente, versátil e controversa.",serve_para:"Tudo que roda no browser. E, com Node.js, também no servidor. É a única linguagem que roda nativamente em todo browser do mundo.",onde_usada:["Front-end de qualquer aplicação web","Back-end com Node.js","Apps mobile com React Native","Scripts e automações"],vantagens:["Ecossistema imenso — tem biblioteca para tudo","Uma linguagem, múltiplos contextos","Comunidade gigantesca","Deploy rápido","Fácil de encontrar devs"],limitacoes:["Tipagem dinâmica causa bugs difíceis de rastrear","Ecossistema fragmentado — muitas opções para o mesmo problema","Performance inferior a linguagens compiladas para processamento pesado"],mercado:"Maior mercado de devs do mundo. Salários medianos. Fácil contratar júnior, mais difícil encontrar sênior experiente.",manutencao:"Depende muito da qualidade do código. JavaScript mal escrito é um dos sistemas mais difíceis de manter.",quando_faz_sentido:"Praticamente qualquer produto web. Time pequeno que precisa de fullstack. Startup que precisa iterar rápido.",quando_nao:"Sistemas críticos que exigem performance extrema. Aplicações financeiras de alta complexidade onde TypeScript seria mais adequado.",gp_precisa_saber:"Se o time usa JavaScript puro sem TypeScript em um produto grande, pergunte por quê. A falta de tipagem em escala é uma fonte consistente de bugs e retrabalho.",nivel_risco:"medio"},{id:"typescript",nome:"TypeScript",emoji:"🔷",tagline:"JavaScript com superpoderes de segurança.",serve_para:"Tudo que JavaScript faz, mas com tipagem estática — o compilador avisa antes de o bug chegar em produção.",onde_usa
