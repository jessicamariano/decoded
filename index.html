@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap');

/* ════════════════════════════════════════════════════════════
   DECODED — DESIGN SYSTEM v2 KV
   Key Visual: Dark Precision · Cyberpunk Editorial · Premium Tech
   ════════════════════════════════════════════════════════════ */

:root {
  /* ── SURFACE SCALE ── */
  --ink:      #080810;
  --ink2:     #0F0F1A;
  --ink3:     #161622;
  --ink4:     #1E1E2E;
  --surface:  #242438;
  --raised:   #2A2A40;
  --overlay:  rgba(8,8,16,0.85);

  /* ── BORDER SCALE ── */
  --border:   #252535;
  --border2:  #353550;
  --border3:  #464668;
  --divider:  rgba(255,255,255,0.04);

  /* ── TEXT SCALE ── */
  --text0:    #F0F0FA;
  --text:     #DCDCF0;
  --text2:    #A8A8C8;
  --text3:    #7878A0;
  --dim:      #6060808;
  --muted:    #484868;
  --ghost:    rgba(255,255,255,0.12);

  /* ── BRAND PALETTE ── */
  --accent:   #00D4FF;
  --accent-glow: rgba(0,212,255,0.15);
  --accent-soft: rgba(0,212,255,0.08);
  --accent2:  #FF2D55;
  --accent2-glow: rgba(255,45,85,0.15);
  --accent2-soft: rgba(255,45,85,0.06);
  --accent3:  #7928CA;
  --yellow:   #FFD60A;
  --yellow-soft: rgba(255,214,10,0.08);
  --green:    #00E587;
  --green-soft: rgba(0,229,135,0.08);
  --orange:   #FF6B35;
  --purple:   #BF5AF2;

  /* ── SEMANTIC COLORS ── */
  --critical:  #FF2D55;
  --warning:   #FFD60A;
  --success:   #00E587;
  --info:      #00D4FF;
  --neutral:   #8888AA;

  /* ── TYPOGRAPHY ── */
  --font-display: 'Syne', sans-serif;
  --font-mono:    'IBM Plex Mono', monospace;
  --font-body:    'Inter', sans-serif;

  /* ── SPACING SCALE (8px base) ── */
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 20px;
  --sp-6: 24px;
  --sp-8: 32px;
  --sp-10: 40px;
  --sp-12: 48px;

  /* ── RADIUS SCALE ── */
  --r-sm:   4px;
  --r-md:   8px;
  --r-lg:   12px;
  --r-xl:   16px;
  --r-full: 9999px;

  /* ── SHADOW SYSTEM ── */
  --shadow-sm:  0 1px 3px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md:  0 4px 16px rgba(0,0,0,0.5), 0 2px 6px rgba(0,0,0,0.3);
  --shadow-lg:  0 12px 40px rgba(0,0,0,0.6), 0 4px 12px rgba(0,0,0,0.4);
  --shadow-xl:  0 24px 64px rgba(0,0,0,0.7), 0 8px 24px rgba(0,0,0,0.5);
  --shadow-glow-accent: 0 0 20px rgba(0,212,255,0.2), 0 0 60px rgba(0,212,255,0.08);
  --shadow-glow-red:    0 0 20px rgba(255,45,85,0.2), 0 0 60px rgba(255,45,85,0.08);

  /* ── EASING ── */
  --ease-out-expo:   cubic-bezier(0.16, 1, 0.3, 1);
  --ease-out-quart:  cubic-bezier(0.25, 1, 0.5, 1);
  --ease-spring:     cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-smooth:     cubic-bezier(0.4, 0, 0.2, 1);

  /* ── BLUR ── */
  --blur-sm:  blur(8px);
  --blur-md:  blur(16px);
  --blur-lg:  blur(32px);
}

/* ── RESET & BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--ink);
  color: var(--text);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  line-height: 1.6;
}

::selection { background: var(--accent); color: var(--ink); }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border3); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* ── GRID BACKGROUND ── */
.grid-bg {
  background-image:
    linear-gradient(var(--divider) 1px, transparent 1px),
    linear-gradient(90deg, var(--divider) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 0%, black 40%, transparent 100%);
}

/* ── TOPBAR ── */
#topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: rgba(8,8,16,0.75);
  backdrop-filter: var(--blur-md);
  -webkit-backdrop-filter: var(--blur-md);
  border-bottom: 1px solid var(--divider);
  transition: background 0.3s var(--ease-smooth);
}

#topbar:hover {
  background: rgba(8,8,16,0.90);
}

/* ── NAVIGATION ── */
.nav-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  border-radius: var(--r-md);
  border: 1px solid transparent;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  font-family: var(--font-body);
  color: var(--dim);
  background: transparent;
  transition: all 0.15s var(--ease-smooth);
  white-space: nowrap;
  position: relative;
}

.nav-item:hover {
  color: var(--text2);
  background: var(--ink3);
  border-color: var(--border);
}

.nav-item.active {
  color: var(--ink);
  background: var(--accent);
  border-color: var(--accent);
}

.nav-item.active:hover {
  box-shadow: 0 0 12px rgba(0,212,255,0.3);
}

/* ── BUTTONS ── */
.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  background: var(--accent);
  color: var(--ink);
  border: none;
  border-radius: var(--r-md);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s var(--ease-out-expo);
  box-shadow: 0 0 0 rgba(0,212,255,0);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,212,255,0.25);
}

.btn-primary:active {
  transform: translateY(0);
}

/* ── CARDS ── */
.card {
  background: var(--ink2);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  transition: all 0.2s var(--ease-smooth);
}

.card:hover {
  border-color: var(--border3);
  background: var(--ink3);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

.card-interactive {
  cursor: pointer;
}

.card-interactive:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}

.card-interactive:active {
  transform: translateY(0);
  box-shadow: var(--shadow-sm);
}

/* ── BADGES ── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: var(--r-sm);
  font-size: 10px;
  font-weight: 600;
  font-family: var(--font-mono);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  border: 1px solid currentColor;
  opacity: 0.85;
}

/* ── STATUS INDICATORS ── */
.status-critical { color: var(--critical); background: rgba(255,45,85,0.08); border-color: rgba(255,45,85,0.3); }
.status-warning  { color: var(--warning);  background: rgba(255,214,10,0.08); border-color: rgba(255,214,10,0.3); }
.status-success  { color: var(--success);  background: rgba(0,229,135,0.08);  border-color: rgba(0,229,135,0.3); }
.status-info     { color: var(--info);     background: rgba(0,212,255,0.08);  border-color: rgba(0,212,255,0.3); }

/* ── SECTION HEADER ── */
.section-header {
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--divider);
}

.section-title {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: clamp(20px, 3vw, 28px);
  color: var(--text0);
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin-bottom: 6px;
}

.section-subtitle {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* ── TAB BAR ── */
.tab-bar {
  display: flex;
  gap: 3px;
  margin-bottom: 20px;
  overflow-x: auto;
  padding-bottom: 4px;
  scrollbar-width: none;
}
.tab-bar::-webkit-scrollbar { display: none; }

.tab-item {
  padding: 7px 14px;
  border-radius: var(--r-md);
  border: 1px solid var(--border);
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  font-family: var(--font-body);
  background: transparent;
  color: var(--dim);
  white-space: nowrap;
  transition: all 0.15s var(--ease-smooth);
  flex-shrink: 0;
}

.tab-item:hover {
  background: var(--ink3);
  color: var(--text2);
  border-color: var(--border3);
}

/* ── CONTENT BLOCKS ── */
.info-block {
  padding: 14px 18px;
  background: var(--ink2);
  border-radius: var(--r-md);
  border: 1px solid var(--border);
  margin-bottom: 16px;
}

.info-block-accent {
  border-left: 3px solid var(--accent);
}

.info-block-red {
  background: rgba(255,45,85,0.04);
  border-color: rgba(255,45,85,0.15);
}

.info-block-green {
  background: rgba(0,229,135,0.04);
  border-color: rgba(0,229,135,0.12);
}

.info-block-yellow {
  background: rgba(255,214,10,0.06);
  border-color: rgba(255,214,10,0.2);
}

/* ── LABEL MICRO ── */
.label-micro {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-family: var(--font-mono);
  margin-bottom: 6px;
}

/* ── CODE / MONO BLOCKS ── */
.mono-block {
  background: var(--ink);
  border-radius: var(--r-md);
  padding: 12px 16px;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.6;
  border: 1px solid var(--border);
  overflow-x: auto;
}

/* ── DIVIDERS ── */
.divider {
  height: 1px;
  background: var(--divider);
  margin: 20px 0;
}

/* ── SEARCH INPUT ── */
.search-input {
  width: 100%;
  background: var(--ink2);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 11px 16px 11px 44px;
  color: var(--text);
  font-size: 14px;
  outline: none;
  font-family: var(--font-body);
  transition: border-color 0.15s, box-shadow 0.15s;
}

.search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
}

.search-input::placeholder { color: var(--muted); }

/* ── ANIMATED ELEMENTS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 currentColor; }
  50%       { opacity: 0.7; box-shadow: 0 0 0 4px transparent; }
}

@keyframes scanline {
  0%   { transform: translateY(-100%); }
  100% { transform: translateY(100vh); }
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-6px); }
}

@keyframes shimmer {
  0%   { background-position: -200% center; }
  100% { background-position: 200% center; }
}

@keyframes gradientShift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ── GLOW SYSTEM ── */
.glow-accent {
  box-shadow: var(--shadow-glow-accent);
}

.glow-red {
  box-shadow: var(--shadow-glow-red);
}

.text-glow-accent {
  text-shadow: 0 0 20px rgba(0,212,255,0.5);
}

/* ── GLASSMORPHISM ── */
.glass {
  background: rgba(255,255,255,0.04);
  backdrop-filter: var(--blur-sm);
  -webkit-backdrop-filter: var(--blur-sm);
  border: 1px solid rgba(255,255,255,0.08);
}

/* ── HOME HERO ── */
.hero-title {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: clamp(56px, 12vw, 96px);
  line-height: 0.90;
  letter-spacing: -0.05em;
  color: var(--text0);
}

.hero-title-accent {
  color: transparent;
  -webkit-text-stroke: 2px var(--accent);
  text-shadow: 0 0 60px rgba(0,212,255,0.15);
}

/* ── CTA CARDS ── */
.cta-card {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  padding: 20px;
  background: var(--ink2);
  border-radius: 14px;
  border: 1px solid var(--border);
  cursor: pointer;
  text-align: left;
  transition: border-color 0.2s, transform 0.2s var(--ease-out-expo), box-shadow 0.2s;
  font-family: var(--font-body);
  position: relative;
  overflow: hidden;
}

.cta-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent 60%, rgba(255,255,255,0.02) 100%);
  opacity: 0;
  transition: opacity 0.2s;
}

.cta-card:hover::before { opacity: 1; }

.cta-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.4);
}

.cta-card:active {
  transform: translateY(-1px);
}

/* ── BACK BUTTON ── */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  color: var(--dim);
  cursor: pointer;
  padding: 7px 14px;
  font-size: 12px;
  font-family: var(--font-body);
  margin-bottom: 20px;
  transition: all 0.15s;
}

.back-btn:hover {
  color: var(--text2);
  border-color: var(--border3);
  background: var(--ink3);
}

/* ── LIST ITEMS ── */
.list-item {
  display: flex;
  gap: 8px;
  margin-bottom: 7px;
  align-items: flex-start;
}

.list-bullet {
  flex-shrink: 0;
  font-size: 11px;
  margin-top: 2px;
  line-height: 1.5;
}

/* ── COMPARISON GRID ── */
.compare-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

@media (max-width: 600px) {
  .compare-grid { grid-template-columns: 1fr; }
}

/* ── REVEAL ANIMATION ── */
.animate-in {
  animation: fadeUp 0.3s var(--ease-out-expo) both;
}

/* ── SECTION WRAPPER ── */
.section-wrapper {
  max-width: 900px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}

@media (max-width: 768px) {
  .section-wrapper { padding: 24px 16px 60px; }
}

/* ── WORD MARK ── */
.wordmark {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 18px;
  letter-spacing: -0.03em;
  color: var(--text0);
}

.wordmark span {
  color: var(--accent);
}

/* ── ACCENT LINE ── */
.accent-line {
  height: 2px;
  background: linear-gradient(90deg, var(--accent) 0%, transparent 100%);
  border-radius: 1px;
  margin-bottom: 20px;
}

/* ── STATS ROW ── */
.stats-row {
  display: flex;
  gap: 32px;
  flex-wrap: wrap;
  padding-top: 32px;
  border-top: 1px solid var(--divider);
}

.stat-item { display: flex; flex-direction: column; gap: 2px; }

.stat-number {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 28px;
  color: var(--accent);
  line-height: 1;
  letter-spacing: -0.02em;
}

.stat-label {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.05em;
}

/* ── URGENCY SYSTEM ── */
.urgency-critica  { color: var(--critical); }
.urgency-alta     { color: var(--orange); }
.urgency-media    { color: var(--warning); }
.urgency-baixa    { color: var(--neutral); }

/* ── FOOTER ── */
.footer {
  padding: 40px 24px;
  border-top: 1px solid var(--divider);
  max-width: 900px;
  margin: 0 auto;
}

/* ── MOBILE RESPONSIVE ── */
@media (max-width: 480px) {
  .hero-title { font-size: clamp(42px, 18vw, 72px); }
  .section-title { font-size: 18px; }
  .cta-card { padding: 16px; }
}

/* ── KEYFRAME: HERO ORB ── */
.hero-orb {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  animation: float 8s ease-in-out infinite;
}

/* ── INLINE OVERRIDES (smooth states) ── */
button { outline: none; }
button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

a:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

/* ── HIGH CONTRAST MODE ── */
@media (prefers-contrast: high) {
  :root {
    --border: #404060;
    --dim: #9090B8;
  }
}

/* ── REDUCED MOTION ── */

@media (max-width: 768px) {
  .mobile-warning { display: block !important; }
}

@media print {
  body { display: none !important; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.1ms !important;
  }
}

"Algo deu errado e não funciona mais. Pode ser uma tela, um fluxo inteiro ou o sistema todo. É...",gp:"Quando ouvir 'está quebrando em produção', é hora de acionar o protocolo de incidente imediatamente: quem investiga,...",alerta:true,urgencia:"crítica"},{id:"subir-ambiente",cat:"girias",nome:"Subir ambiente / Está em produção",nivel:"básico",flash:"'Subir ambiente' = inicializar ou publicar num servidor. 'Está em produção' = está no ar de verdade para os usuários.",simples:"'Subir o ambiente de homolog' = colocar a versão no servidor de testes para o QA testar. 'Está em...",gp:"SEMPRE confirme: 'Isso está em produção ou em homolog?' A resposta define se o cliente foi impactado ou não — e muda...",alerta:false,urgencia:"média"},{id:"on-premise",cat:"infra",nome:"On-premise vs Cloud",nivel:"inter",flash:"On-premise: infraestrutura física no próprio cliente. Cloud: infraestrutura alugada de provedores na internet.",simples:"On-premise = servidor físico no escritório ou datacenter do cliente. Cloud = servidor 'alugado' na...",gp:"On-premise tem custo fixo alto, implantação mais longa e manutenção a cargo do cliente (ou seu time). Cloud tem custo...",alerta:false,urgencia:"baixa"}];const SITUACOES=[{id:"incidente",emoji:"🚨",label:"Gerenciando incidente",cor:"#FF3366",desc:"Sistema caiu ou degradado. Você precisa agir agora.",termos:["rollback","logs-term","sla","postmortem","circuit-breaker","debito-tecnico","health-check","observabilidade","retry-backoff"]},{id:"planning",emoji:"📋",label:"Em planning / refinamento",cor:"#00E5FF",desc:"Estimando esforço, priorizando backlog, planejando sprint.",termos:["sprint","debito-tecnico","mvp","spike","wip-limit","burndown","cycle-lead-time","pmbok8-tailoring"]},{id:"deploy",emoji:"🚀",label:"Tem deploy acontecendo",cor:"#00FF94",desc:"Release programada ou emergencial. O que você precisa saber.",termos:["rollback","ci-cd","feature-flag","blue-green","smoke-test","cache","logs-term","sla"]},{id:"reuniao",emoji:"⚡",label:"Em reunião técnica AGORA",cor:"#FFE566",desc:"Modo emergência. Definições em 10 segundos.",termos:["branch","pull-request","api","cache","debito-tecnico","rate-limit","cors","idempotencia"]},{id:"escopo",emoji:"🤝",label:"Negociando prazo ou escopo",cor:"#B794F4",desc:"Argumentos técnicos para conversa com stakeholders.",termos:["debito-tecnico","mvp","poc","time-to-market","pmbok8-value-delivery","pmbok8-finance","cycle-lead-time"]},{id:"pmbok8",emoji:"📘",label:"Aplicando PMBOK 8 no projeto",cor:"#F48FB1",desc:"Conceitos e princípios da 8ª edição na prática do dia a dia.",termos:["pmbok8-value-delivery","pmbok8-governance","pmbok8-6-principles","pmbok8-7-domains","pmbok8-hybrid","pmbok8-tailoring","pmbok8-benefits-realization","pmbok8-accountable-leader"]},{id:"seguranca",emoji:"🔐",label:"Revisando segurança do projeto",cor:"#80CBC4",desc:"O que checar antes do go-live e em auditorias.",termos:["lgpd","owasp","xss","env-vars","idempotencia","transacao-acid","middleware","cors"]}];const WAR_ROOM_PROTOCOLO=[{tempo:"0–5 min",acoes:["Confirmar que é incidente real (não homolog)","Identificar: fora do ar ou degradado?","Acionar Tech Lead e DevOps no canal de crise","Abrir thread dedicada: 'INCIDENTE — [sistema] — [hora]'"],nao:["Tentar resolver você mesmo","Mandar e-mail (demora demais)","Comunicar cliente antes de ter informação mínima"]},{tempo:"5–15 min",acoes:["Coletar: qual funcionalidade? Quantos usuários afetados?","Perguntar: 'Existe rollback disponível?'","Definir ETA inicial ('investigando — próxima atualização em 15min')","Rascunhar comunicação ao cliente: tom calmo, fatos, próxima atualização"],nao:["Pressionar dev por solução antes de entender o problema","Prometer prazo sem validar com tech lead","Silêncio total com cliente por mais de 20 minutos"]},{tempo:"15–60 min",acoes:["Manter atualização cadenciada ao cliente (cada 15-20min)","Documentar linha do tempo no thread","Se rollback necessário: confirmar janela, comunicar cliente, acompanhar","Avaliar se o SLA está em risco e calcular exposição contratual"],nao:["Mudar de estratégia a cada 5 minutos por pressão","Escalar para stakeholder sem ter fatos concretos","Deixar o dev sem visibilidade do impacto no cliente"]},{tempo:"Pós-resolução",acoes:["Comunicação de encerramento ao cliente com causa resumida","Agendar postmortem (máx 48h após o incidente)","Documentar timeline completa enquanto memória está fresca","Verificar se SLA foi violado e quais ações contratuais são necessárias"],nao:["Fingir que não aconteceu","Pular o postmortem por 'falta de tempo'","Atribuir culpa publicamente"]}];const LEITURA_LOG=[{nivel:"FATAL",cor:"#B71C1C",bg:"rgba(183,28,28,0.15)",sig:"Sistema parou — erro irrecuperável",ex:"[FATAL] Database connection pool exhausted — no connections available",trad:"O banco ficou sem conexões disponíveis. O sistema inteiro parou de responder.",acao:"Incidente crítico. Protocolo imediato."},{nivel:"ERROR",cor:"#FF5252",bg:"rgba(255,82,82,0.1)",sig:"Falha que pode impactar usuários",ex:"[ERROR] PaymentService: Connection refused after 3 retries — 14:32:11",trad:"Serviço de pagamento não conseguiu conectar à API após 3 tentativas. Usuários com falha no checkout.",acao:"Checar se API parceira está fora. Perguntar: qual o impacto para o usuário final?"},{nivel:"WARN",cor:"#FFB74D",bg:"rgba(255,183,77,0.1)",sig:"Algo fora do esperado, sistema continua",ex:"[WARN] Cache miss rate: 78% (threshold: 30%) — database load increasing",trad:"Cache funcionando mal — 78% das consultas vão direto ao banco. Banco sobrecarregado.",acao:"Não emergência mas sinal de degradação. Monitorar."},{nivel:"INFO",cor:"#4FC3F7",bg:"rgba(79,195,247,0.08)",sig:"Evento normal, só registro",ex:"[INFO] User 4521 authenticated — session created — 10:14:33",trad:"Usuário logou com sucesso. Linha normal de log.",acao:"Nenhuma ação. Útil para reconstruir o que um usuário fez antes de um erro."},{nivel:"DEBUG",cor:"#78909C",bg:"rgba(120,144,156,0.08)",sig:"Detalhe técnico para diagnóstico",ex:"[DEBUG] Query SELECT * FROM orders WHERE user_id=? — 2847ms",trad:"Query específica demorou 2,8 segundos. Visível em debug mode.",acao:"Se em produção com tempo alto: query lenta a otimizar."}];const DECODIFICADOR=[{frase:"'A gente vai precisar refatorar isso antes'",sig:"O código está tão degradado que adicionar a feature vai ser muito mais difícil do que parece. Pedido de tempo para limpar antes de construir.",risco:"Ignorar = entrega frágil que quebra em produção ou custa 3x mais para manter.",pergunta:"'Quanto tempo de refatoração? Podemos fazer em paralelo com a feature ou precisa ser antes?'"},{frase:"'Isso não é trivial'",sig:"A tarefa tem complexidade escondida que a estimativa inicial não capturou. O dev está te avisando que vai demorar mais.",risco:"Confirmar o prazo original sem investigar o que tornou não-trivial é aposta perigosa.",pergunta:"'O que especificamente está tornando complexo? Tem algo que podemos simplificar no escopo?'"},{frase:"'Depende de como o cliente quer'",sig:"Requisito ambíguo. O dev tem duas ou mais interpretações e precisa de decisão antes de construir.",risco:"Deixar o dev decidir sozinho = ele implementa o mais fácil, não o que o cliente precisa.",pergunta:"'Quais são as interpretações possíveis? Me explica cada cenário e a gente alinha hoje.'"},{frase:"'Tecnicamente possível, mas...'",sig:"É possível, mas vai custar caro — tempo, qualidade, débito técnico ou risco. O 'mas' é o conteúdo importante.",risco:"Ouvir só o 'possível' sem o 'mas' cria comprometimento irresponsável.",pergunta:"'Me conta o mas completo. Qual é o custo real de fazer isso?'"},{frase:"'A infraestrutura não aguenta'",sig:"O sistema não tem capacidade para o volume planejado. Problema estrutural, não de código.",risco:"Lançar sem resolver = sistema caindo no momento de maior visibilidade.",pergunta:"'Qual é o gargalo específico? Custo estimado para resolver? Prazo mínimo?'"},{frase:"'Está em homolog mas produção é diferente'",sig:"Os ambientes têm diferenças que podem fazer algo funcionar em um e quebrar no outro.",risco:"Deploy sem investigar as diferenças é roleta.",pergunta:"'Quais são as diferenças específicas? Tem como validar antes do deploy?'"},{frase:"'A gente pode mockar por enquanto'",sig:"Usaremos versão simulada de um serviço para não ficar bloqueados. Desenvolvimento continua, mas teste real ainda precisa acontecer.",risco:"Esquecer de testar com o serviço real antes de ir para produção.",pergunta:"'Quando faremos o teste com o serviço real? Quem acompanha esse passo?'"},{frase:"'Já foi assim que a gente fez antes'",sig:"O dev está defendendo uma solução por familiaridade, não necessariamente porque é a melhor para esse contexto.",risco:"Repetir padrões ruins por inércia acumula débito técnico.",pergunta:"'Faz sentido aqui também? Tem alternativas que valem considerar?'"}];const SINAIS_PROJETO=[{cat:"Arquitetura em Risco",icon:"🏗️",cor:"#FF7043",sinais:["'Não mexe naquele módulo — ninguém sabe como funciona'","Qualquer mudança pequena quebra coisas não relacionadas","Time tem medo de deploy (de qualquer dia da semana)","Novos devs levam semanas para fazer qualquer entrega","Ninguém sabe o que acontece quando o sistema escalar"]},{cat:"Débito Técnico Oculto",icon:"💳",cor:"#AB47BC",sinais:["Velocity caindo sprint a sprint sem mudança de escopo","Bugs 'impossíveis' aparecendo com frequência","Dev pede 'sprint para arrumar coisas' sem conseguir explicar o quê","Estimativas ficando cada vez mais conservadoras para tarefas similares","Testes automatizados inexistentes ou ignorados pelo time"]},{cat:"Escopo Tóxico",icon:"☢️",cor:"#EF5350",sinais:["Requisito que cresce a cada reunião de alinhamento","Cliente trata backlog como lista de pedidos ilimitada","'Só adiciona isso rapidinho' em toda sprint","Feature aprovada que muda de critério depois que o dev começou","MVP acumulando 'funcionalidades essenciais' que nunca param de aparecer"]},{cat:"Time Desmotivado",icon:"🔋",cor:"#78909C",sinais:["Daily meetings com respostas monossilábicas","Devs pararam de sugerir melhorias ou questionar decisões","Ninguém defende mais a qualidade — 'entrega logo'","Alta rotatividade ou conversas de saída frequentes","Retros silenciosas — ninguém aponta o que está errado de verdade"]},{cat:"Stakeholder Problemático",icon:"🎭",cor:"#26A69A",sinais:["Aprova tudo em reunião e muda tudo depois por e-mail","Bypassa o GP e fala diretamente com os devs","Trata estimativa como negociação de mercado ('e se for metade?')","Nunca disponível para decisão mas sempre disponível para crítica","Escala para diretoria decisões previamente acordadas"]}];const CULTURA=[{titulo:"A hierarquia que o organograma não mostra",emoji:"🗺️",conteudo:"Em qualquer time de engenharia existe uma hierarquia informal que nada tem a ver com cargo. Existe o 'dev que todos consultam antes de decidir', o 'dev que discorda mas todos ouvem', e o 'dev com mais experiência no domínio'. Ignorar essa hierarquia é negociar com o secretário quando a decisão está com o diretor. Mapeie quem tem influência técnica real antes de implementar qualquer mudança de processo."},{titulo:"Como fazer pergunta técnica sem parecer leiga (e sem parecer arrogante)",emoji:"💬",conteudo:"Fórmula: (1) Declare o que você entende, (2) Aponte o que não entende, (3) Peça ajuda para conectar. Ruim: 'Não entendo nada disso, me explica'. Bom: 'Entendo que o cache está desatualizado. O que não tenho clareza é: invalidar vai impactar o usuário durante a operação ou é transparente?' Você demonstra que pensou antes de perguntar."},{titulo:"O que significa quando o dev silencia na reunião",emoji:"🔇",conteudo:"Silêncio técnico em planning quase nunca significa concordância. Geralmente: (a) discorda mas não quer conflito, (b) acha a pergunta sem sentido mas não sabe como explicar, ou (c) está processando uma complexidade que a pergunta não capturou. Sempre que houver silêncio após estimativa ou decisão técnica, pergunte: 'Tem alguma preocupação técnica que não foi dita?'"},{titulo:"Como ler o Slack do time técnico como documento político",emoji:"💻",conteudo:"Observe: Quem menciona quem quando tem problema? Quem é marcado para tomar decisão? Quem responde rápido e quem ignora? Quem faz perguntas abertas e quem apresenta soluções prontas? Padrões de comunicação revelam estrutura real de poder, pontos de tensão não ditos, e quem está sobrecarregado antes que vire crise."},{titulo:"Tech Lead que protege o time vs. Tech Lead que protege o ego",emoji:"🧭",conteudo:"Protege o time: absorve pressão vinda de cima, defende estimativas realistas, atribui crédito publicamente, expõe problemas cedo mesmo que desconfortável. Protege o ego: blinda o time de feedback externo, desconsidera estimativas de devs juniors, toma decisões sem consulta, esconde débito técnico da gestão."},{titulo:"A diferença entre empresa tech e empresa com time de tech",emoji:"🏢",conteudo:"Empresa tech: tecnologia é o produto, engenharia tem voz na estratégia, débito técnico é discutido em diretoria, times têm autonomia para escolher ferramentas. Empresa com time de tech: TI é suporte ao negócio, decisões técnicas são subordinadas a comerciais, 'o sistema é legado mas funciona' é argumento aceito. Saber onde você está muda como você posiciona problemas técnicos."}];const DECODE_STEPS=[{letra:"D",nome:"Diagnóstico",cor:"#FF3366",pergunta:"O que exatamente está falhando?",ex:"'O checkout não processa Pix desde às 14h'"},{letra:"E",nome:"Extensão",cor:"#FF7043",pergunta:"Quantos usuários e qual o tempo de impacto?",ex:"'~200 tentativas com falha, 100% de erro desde 14h22'"},{letra:"C",nome:"Causa",cor:"#FFE566",pergunta:"Qual é a causa raiz identificada?",ex:"'API do banco retornando timeout — confirmado com suporte'"},{letra:"O",nome:"Opções",cor:"#00E5FF",pergunta:"Quais são as alternativas disponíveis?",ex:"'1) Aguardar banco 2) Rollback 3) Desabilitar Pix temporariamente'"},{letra:"D",nome:"Decisão",cor:"#00FF94",pergunta:"Qual opção escolhemos e por quê?",ex:"'Opção 3: desabilitar via feature flag, comunicar usuários'"},{letra:"E",nome:"Execução",cor:"#B794F4",pergunta:"Quem faz o quê e em qual prazo?",ex:"'Dev: flag em 10min / GP: comunicação em 5min / Dev: monitorar'"}];// DADOS — NOVAS SEÇÕES V4 EXPANSÃO
const CENARIOS_INCIDENTE=[{id:"deploy-quebrado",titulo:"Deploy Quebrou em Produção",emoji:"💥",urgencia:"crítica",cor:"#FF3366",contexto:"É 16h de uma quinta-feira. O deploy da v2.4.0 acabou de subir. Em 8 minutos o Slack começa a lotar: 'checkout não funciona', '500 em toda a API de pedidos', 'clientes reclamando'.",sintomas:["Taxa de erro subindo de 0,2% para 47% em 5 minutos","Logs cheios de NullPointerException no OrderService","Alertas do Datadog disparando para latência P99 > 8000ms","Fila de suporte com 23 tickets em 10 minutos"],sinais_ocultos:["O mesmo módulo foi tocado em 3 PRs diferentes nessa sprint","Migration de banco foi incluída no último minuto sem revisão adequada","O smoke test estava desabilitado 'temporariamente' há 2 semanas","O dev responsável está de férias amanhã"],gp_junior:"Entra em pânico. Manda mensagem para o dev: 'O que está acontecendo???' Espera resposta. Não comunica o cliente. Depois de 40 minutos pergunta se já foi resolvido.",gp_senior:"Em 3 minutos: confirma que é produção, aciona Tech Lead, pergunta 'temos rollback pronto?', abre canal de crise no Slack, manda primeira atualização para o cliente ('identificamos instabilidade, time atuando, próxima atualização em 15min'). Nunca promete prazo sem validar com o tech.",lider:"Além do operacional: checa se o SLA foi violado, avalia se precisa acionar o CTO, começa a pensar no postmortem antes de a crise terminar, documenta a linha do tempo em tempo real.",comunicacao_cliente:"'Identificamos uma instabilidade em produção às [hora]. Nossa equipe está atuando ativamente. O módulo afetado é [X]. Previsão de próxima atualização: [15 minutos]. Pedimos desculpas pelo impacto.'",erros_comuns:["Esperar o dev resolver sozinho sem estruturar o protocolo","Prometer prazo de resolução sem base técnica","Comunicar o cliente com jargão técnico ('temos um NPE no OrderService')","Não registrar a linha do tempo para o postmortem","Fazer rollback sem confirmar se tem migration de banco envolvida"],plano_acao:["0-5min: Confirmar incidente real, acionar Tech Lead e DevOps, abrir canal de crise","5-15min: Avaliar rollback (existe? tem migration? banco compatível?), primeira comunicação ao cliente","15-30min: Se rollback disponível e seguro, executar. Se não, hotfix em andamento com ETA","30-60min: Comunicações a cada 15-20min, documentar tudo, avaliar SLA","Pós-resolução: Comunicação de encerramento, agendar postmortem em 48h"],decisao_dificil:"Fazer rollback imediato (mais seguro, mas pode perder dados da migration) ou tentar hotfix (mantém dados, mas pode demorar 1h+). A decisão depende: tem migration com dados? Quanto tempo o sistema pode ficar degradado?",impacto_negocio:"Cada hora de checkout fora do ar = X pedidos perdidos. Calcule: ticket médio × taxa de conversão × hora. Apresente para stakeholders como impacto financeiro, não como 'problema técnico'."},{id:"sprint-colapsando",titulo:"Sprint em Colapso",emoji:"🌀",urgencia:"alta",cor:"#FF7043",contexto:"É quarta-feira, meio da sprint de 2 semanas. Burndown mostra 78% do trabalho ainda por fazer. Três devs estão bloqueados por dependências externas. O cliente acabou de pedir uma feature 'urgente' que não estava no escopo.",sintomas:["Burndown flat há 3 dias — sem progresso visível","Daily meetings com 'ainda estou nisso' repetido","PR abertos há 4 dias sem review","Feature nova sendo pressionada pelo cliente sem análise de impacto"],sinais_ocultos:["O 'bloqueio por dependência' não foi reportado no início da sprint — ficou 2 dias em silêncio","A feature 'urgente' do cliente foi prometida informalmente por alguém sem passar pelo GP","Um dos devs está sobrecarregado com tarefa de outra frente que não está no board","O Tech Lead está revisando todos os PRs sozinho e está com 7 para revisar"],gp_junior:"Adiciona a feature nova no backlog da sprint sem remover nada. Pressiona o time para 'acelerar'. Não investiga os bloqueios. Na review, tenta passar histórias incompletas como 'em andamento'.",gp_senior:"Faz triagem imediata: (1) mapeia o que está bloqueado e por quê, (2) remove ou renegocia escopo para acomodar o real, (3) responde ao cliente com análise de impacto da feature nova: 'Para incluir isso na sprint, precisamos remover X ou Y — qual é a prioridade?', (4) descobre a sobrecarga oculta do dev.",lider:"Vê o padrão antes de chegar ao colapso. Daily com 'ainda estou nisso' no segundo dia já é sinal de intervenção. Revisão de 7 PRs por um Tech Lead sozinho é gargalo sistêmico, não individual.",comunicacao_cliente:"'Recebemos sua solicitação de [feature]. Para incluí-la na sprint atual, precisaremos remover [escopo equivalente] ou estender o prazo em [X dias]. Qual é a sua preferência? Podemos alinhar isso em uma chamada rápida hoje?'",erros_comuns:["Adicionar escopo sem remover nada ('só mais uma coisinha')","Não investigar bloqueios — tratar como problema do dev","Não comunicar ao cliente que a sprint está em risco antes da review","Tentar recuperar o atraso pressionando o time nas últimas 2 sprints","Passar histórias incompletas como 'concluídas' no review"],plano_acao:["Mapeamento imediato: o que está bloqueado, por quanto tempo, por quê","Classificar cada item: pode ser desempedido agora? Precisa sair da sprint? Mover para próxima?","Comunicar stakeholders antes da review, não na review","Renegociar escopo com cliente mostrando o trade-off real","Investigar a sobrecarga oculta — tem trabalho no board que não está visível?"],decisao_dificil:"Anunciar para o cliente que a sprint não vai entregar o combinado é difícil mas necessário. O erro clássico é esconder até a review e aí o cliente descobre ao vivo. A conversa antecipada dói menos.",impacto_negocio:"Sprint que colapsa sem comunicação proativa cria expectativa irreal no cliente. Cada sprint assim corrói confiança — ativo intangível que demora muito para reconstruir."},{id:"stakeholder-crise",titulo:"Stakeholder em Crise",emoji:"🎭",urgencia:"alta",cor:"#AB47BC",contexto:"O cliente acabou de descobrir em produção um bug que afeta 15% dos usuários. Ele não foi comunicado. Está ligando para o diretor da sua empresa. Está ameaçando escalar o contrato.",sintomas:["Cliente foi surpreendido por problema em produção sem comunicação prévia","Tom de e-mail/mensagem com urgência e hostilidade crescente","Escalação para cima da cadeia hierárquica","Referência ao contrato ou SLA"],sinais_ocultos:["O bug era conhecido internamente há 2 dias mas 'estava sendo investigado'","Alguém decidiu não comunicar o cliente para 'não preocupar à toa'","A comunicação do incidente foi enviada para o contato técnico, não para o decisor","O cliente já havia sinalizado insatisfação no mês anterior mas não foi tratado"],gp_junior:"Fica na defensiva. Explica o que aconteceu tecnicamente. Tenta provar que o bug 'não é tão grave'. Promete que 'não vai acontecer de novo'. Não resolve a causa raiz do problema relacional.",gp_senior:"Separa o problema em duas camadas: (1) o bug técnico — que já está sendo resolvido, (2) a quebra de confiança relacional — que precisa de ação separada. Liga para o cliente em vez de e-mail. Ouve. Não se defende no primeiro momento. Propõe reunião de alinhamento com a liderança.",lider:"Entende que o cliente em crise não está com raiva do bug — está com raiva da surpresa e da falta de controle. A solução não é técnica. É relacional. Pede reunião com o decisor, não com o operacional.",comunicacao_cliente:"'[Nome], estou ligando para falar diretamente sobre o que aconteceu. Entendo que a forma como fomos comunicados foi inadequada e que isso criou uma situação difícil para vocês. Quero garantir que você tenha visibilidade total. Posso falar agora 10 minutos?'",erros_comuns:["Entrar em modo de defesa técnica quando o problema é relacional","Enviar e-mail longo explicando o bug ao invés de ligar","Deixar o CTO do cliente sem contato direto da liderança","Prometer que 'não vai acontecer de novo' sem processo para garantir","Tratar o cliente em crise como uma demanda operacional"],plano_acao:["Contato imediato por voz (não e-mail) com a pessoa certa na hierarquia do cliente","Ouvir sem defender — entender o impacto real para o negócio deles","Apresentar: o que aconteceu, o que está sendo feito, o que vai mudar no processo","Propor reunião de alinhamento com as lideranças de ambos os lados","Documentar os compromissos assumidos e cumprir com prazo menor do que o prometido"],decisao_dificil:"Em crise relacional, a decisão mais difícil é abrir mão de 'ter razão' para preservar a relação. O cliente pode estar exagerando o impacto. Mas discutir isso no momento de crise é garantia de perda do cliente.",impacto_negocio:"Cliente em crise que não é bem gerenciado tende a escalar para rescisão contratual, avaliações negativas e referências ruins. O custo de aquisição de um novo cliente equivalente raramente é calculado antes de se perder um."},{id:"api-fora-ar",titulo:"API de Parceiro Fora do Ar",emoji:"🔌",urgencia:"alta",cor:"#EF5350",contexto:"É segunda-feira às 10h. A API de pagamento do parceiro está retornando 503 para 100% das requisições. O sistema está funcionando mas nenhum pedido pode ser processado. O parceiro não respondeu ainda.",sintomas:["100% de erro 503 na integração de pagamento","Fila de pedidos crescendo sem processamento","Usuários recebendo 'falha no pagamento'","Suporte com tickets chegando rapidamente"],sinais_ocultos:["O parceiro tem histórico de instabilidade às segundas-feiras por manutenção","Não existe circuit breaker configurado — cada tentativa de pagamento está esperando 30s de timeout","Não há fallback de meio de pagamento alternativo","O SLA do parceiro não foi mapeado no contrato do projeto"],gp_junior:"Espera o parceiro voltar. Responde tickets de suporte individualmente. Não comunica o cliente. Não tem visibilidade de quando vai resolver.",gp_senior:"(1) Aciona o contato de suporte do parceiro com classificação de incidente crítico, (2) Avalia com o tech se é possível habilitar fallback (outros meios de pagamento), (3) Comunica o cliente imediatamente com o que está acontecendo e o que está sendo feito, (4) Monitora o status page do parceiro, (5) Documenta o impacto em pedidos perdidos.",lider:"Usa o incidente como evidência para: implementar circuit breaker (previne timeout em cascata), mapear fallback de pagamento (deveria existir), revisar o SLA do parceiro (quais são as penalidades contratuais?) e criar runbook para próxima vez.",comunicacao_cliente:"'Identificamos que nosso parceiro de pagamento [nome] está apresentando instabilidade desde [hora]. Nenhum pedido está sendo perdido — eles estão na fila para processamento. ETA de resolução: aguardando retorno do parceiro. Atualização em 30 minutos.'",erros_comuns:["Não comunicar o cliente esperando o parceiro resolver sozinho","Não ter o número de escalação do parceiro para incidentes críticos","Não calcular o impacto financeiro para apresentar ao cliente","Não usar o incidente para melhorar a arquitetura (circuit breaker, fallback)","Tratar cada ticket de suporte individualmente ao invés de comunicação em massa"],plano_acao:["Contato imediato com suporte do parceiro via canal de incidentes críticos","Avaliar se circuit breaker pode ser ativado para parar o fluxo de timeouts","Comunicar cliente com frequência cadenciada enquanto parceiro não retorna","Se parceiro demorar >1h: avaliar habilitar meios alternativos de pagamento","Registrar impacto: quantos pedidos afetados, qual o valor estimado"],decisao_dificil:"Se o parceiro não volta em 2h e não há fallback: comunicar o cliente que o checkout ficará indisponível temporariamente ou manter online mostrando erro? A segunda opção pode gerar mais frustração.",impacto_negocio:"Dependência de API de terceiro sem fallback é risco operacional que vira risco financeiro. Calcule: pedidos por hora × ticket médio × horas de indisponibilidade do parceiro nos últimos 12 meses."},{id:"escopo-explodindo",titulo:"Escopo Explodindo",emoji:"☢️",urgencia:"média",cor:"#FFB74D",contexto:"O projeto está na sprint 6 de 10. O escopo cresceu 40% desde o início. O cliente continua pedindo pequenas adições. O time está exausto. O prazo original já não é viável mas ainda não foi comunicado.",sintomas:["Backlog crescendo sprint a sprint sem remoção equivalente","'Só mais uma coisinha' em toda reunião de alinhamento","Velocity caindo progressivamente","Time sem energia para discutir qualidade — só entregando"],sinais_ocultos:["O GP aprovou pequenas adições de escopo sem documentar o impacto acumulado","O cliente não tem clareza de que 'pequenas adições' têm custo real","Ninguém calculou o impacto acumulado das mudanças desde o início","O time técnico parou de sinalizar débito técnico — desistiu de ser ouvido"],gp_junior:"Continua aceitando adições para 'não decepcionar o cliente'. Trabalha mais horas tentando compensar. Não comunica o risco de prazo. Explode no final do projeto.",gp_senior:"Para o ciclo: faz um balanço de escopo com o cliente mostrando o que foi adicionado desde o início, o impacto em prazo e custo de cada adição, e propõe três opções: (1) manter escopo atual e estender o prazo, (2) voltar ao escopo original e manter o prazo, (3) priorizar e cortar.",lider:"Entende que escopo explodindo é quase sempre sintoma de dois problemas simultâneos: cliente sem clareza de que mudanças têm custo, e GP sem processo de change control. Resolve os dois, não só o sintoma.",comunicacao_cliente:"'Quero fazer uma pausa para revisarmos juntos o escopo do projeto. Desde o kick-off, incorporamos [X] adições que representam [Y]% a mais de trabalho. Isso impacta o prazo original em [Z semanas]. Precisamos de uma decisão sobre como prosseguir — posso apresentar as opções amanhã?'",erros_comuns:["Aceitar adições de escopo sem documentar o impacto acumulado","Não ter um processo formal de change request desde o início","Comunicar o atraso só quando o prazo já estourou","Tratar o cliente como adversário ao invés de parceiro na decisão","Não mostrar o impacto acumulado — deixar o cliente sem visibilidade"],plano_acao:["Criar inventário de todas as adições desde o kick-off com impacto estimado","Apresentar ao cliente a situação real: escopo atual vs. escopo original","Propor opções claras com trade-offs explícitos","Implementar processo de change request formal para o que restar do projeto","Fazer isso antes de o prazo explodir — não depois"],decisao_dificil:"Mostrar ao cliente que o projeto está maior do que o combinado sem parecer que você perdeu o controle. A narrativa é: 'Evoluímos juntos o projeto — agora precisamos alinhar a realidade desse crescimento.'",impacto_negocio:"Projeto que termina com escopo 40% maior sem ajuste de prazo ou custo = prejuízo real do lado da consultoria. Calcule o custo por hora do time × horas adicionais. Esse número justifica a conversa difícil."}];const LEITURA_ENGENHARIA=[{id:"tech-spec",titulo:"Como Ler uma Tech Spec",emoji:"📐",descricao:"A Tech Spec é o documento que o dev ou Tech Lead escreve antes de implementar algo complexo. Como GP, você não precisa entender o código — mas precisa saber o que procurar.",o_que_e:"Documento técnico que descreve: o problema que será resolvido, a solução proposta, as alternativas consideradas e descartadas, os trade-offs, os riscos, as dependências e o plano de implementação.",o_que_procurar:[{sinal:"Alternativas consideradas",ok:"A spec descreve 2-3 abordagens e explica por que a escolhida foi selecionada",problema:"Spec que apresenta só uma solução sem comparação pode indicar falta de análise ou viés do autor"},{sinal:"Riscos explícitos",ok:"Seção dedicada a riscos com mitigações propostas",problema:"Spec sem seção de riscos é sinal de que os riscos não foram pensados — não que não existam"},{sinal:"Métricas de sucesso",ok:"'Saberemos que funcionou quando a latência P95 cair de 2s para 400ms'",problema:"Spec sem métricas = sem forma de validar se a solução resolveu o problema"},{sinal:"Dependências e impactos",ok:"Lista clara de outros serviços, times ou sistemas afetados",problema:"Spec que ignora dependências cria surpresas em integração"},{sinal:"Estimativa de esforço",ok:"Estimativa com nível de confiança explícito ('±30% de incerteza')",problema:"Estimativa sem nível de confiança parece mais precisa do que é — perigo de comprometimento irreal"}],perguntas_gp:["Por que essa abordagem foi escolhida ao invés das alternativas?","Qual risco você mais teme nessa implementação?","O que poderia fazer essa estimativa dobrar?","Há algum sistema externo que pode travar essa entrega?","Como saberemos que funcionou?"],sinais_de_alerta:["Tech Spec de 2 parágrafos para feature complexa — reflexão insuficiente","Spec escrita depois que a implementação começou — documento retroativo, não planejamento","Spec sem seção de trade-offs — solução apresentada como a única possível","Spec que o dev não consegue explicar verbalmente — não internalizou a proposta"]},{id:"arquitetura-ruim",titulo:"Sinais de Arquitetura em Risco",emoji:"🏚️",descricao:"Você não precisa entender arquitetura para identificar que ela está ruim. Os sinais aparecem no comportamento do time e do sistema.",sinais:[{titulo:"'Não mexe ali'",descricao:"Quando o time tem 'zonas proibidas' no código — partes que ninguém ousa modificar por medo de quebrar algo que ninguém entende — a arquitetura falhou em encapsulamento e modularidade.",impacto:"Cada nova feature que toca nessa área demora 3x mais e tem risco de regressão alto.",o_que_fazer:"Identifique quantas features planejadas tocam nessa área. Transforme isso em argumento para refatoração."},{titulo:"Mudança pequena, impacto grande",descricao:"Quando adicionar um campo num formulário exige mexer em 8 arquivos diferentes ou tem risco de quebrar funcionalidades não relacionadas, o acoplamento está alto demais.",impacto:"Velocity cai progressivamente. Time fica cada vez mais conservador nas estimativas.",o_que_fazer:"Peça ao Tech Lead para quantificar: 'Das últimas 10 features, quantas causaram bugs não relacionados?' Se > 3, é evidência de acoplamento problemático."},{titulo:"Sem ambiente de teste confiável",descricao:"Se a única forma de testar é em produção, ou se o ambiente de homolog difere tanto de produção que 'passou em homolog' não significa nada, a arquitetura de ambientes está quebrada.",impacto:"Bugs chegam ao cliente. QA tem baixo valor. Time não tem confiança para deployar.",o_que_fazer:"Pergunte: 'Quando a homolog diverge de produção, o que muda?' A resposta revela o risco."},{titulo:"Sem testes automatizados em código crítico",descricao:"Código financeiro, de autenticação ou de pedidos sem cobertura de testes é bomba relógio. Qualquer mudança pode introduzir regressão silenciosa.",impacto:"Hotfixes frequentes. Time com medo de refatorar. Lentidão progressiva.",o_que_fazer:"Pergunte ao Tech Lead: 'Qual é a cobertura de testes nos módulos de pagamento e autenticação?' Menos de 70% é sinal de alerta."},{titulo:"Deploys frequentemente revertidos",descricao:"Rollbacks frequentes indicam que o processo de deploy não tem validação suficiente — ou que o código não está estável o suficiente antes de chegar a produção.",impacto:"Tempo perdido em reversão. Confiança do cliente abalada. Time desgastado.",o_que_fazer:"Calcule a Change Failure Rate (% de deploys revertidos nos últimos 3 meses). Acima de 15% é território de alerta."}]},{id:"debito-oculto",titulo:"Sinais de Débito Técnico Oculto",emoji:"💳",descricao:"Débito técnico raramente é anunciado. Aparece em comportamentos, não em relatórios. Saiba o que observar.",sinais:[{titulo:"Velocity caindo sem mudança de escopo",descricao:"O time está entregando menos story points por sprint sem aumento visível de complexidade. A complexidade invisível é o débito.",como_identificar:"Compare velocity das últimas 6 sprints. Queda de 20%+ sem justificativa clara é sinal."},{titulo:"Estimativas ficando cada vez mais conservadoras",descricao:"Devs que antes estimavam 3 pontos agora estimam 8 para a mesma categoria de tarefa. Estão compensando o custo oculto do débito.",como_identificar:"Peça ao Tech Lead: 'Por que essa tarefa similar às anteriores está estimada em mais pontos?' A resposta vai revelar o débito."},{titulo:"'Vou fazer um workaround por enquanto'",descricao:"Workaround é débito técnico na hora em que é criado. 'Por enquanto' frequentemente significa 'para sempre'.",como_identificar:"Conte quantos workarounds foram documentados no último trimestre. Sem documentação, é débito invisível."},{titulo:"Nenhum item técnico no backlog",descricao:"Se o backlog tem só features e nenhum item de melhoria técnica, o time parou de pagar a dívida — ou parou de reportá-la.",como_identificar:"Revise o backlog: qual % são items técnicos (refatoração, testes, infraestrutura)? Zero % é sinal grave."},{titulo:"Dev que 'sabe tudo' sobre um módulo",descricao:"Quando existe uma pessoa única que entende um módulo inteiro — conhecimento não documentado, não testado, não transferível — é débito de conhecimento e de arquitetura.",como_identificar:"Pergunte: 'O que acontece se [essa pessoa] sair amanhã?' A resposta revela o risco."}]}];const TROUBLESHOOTING=[{id:"sistema-lento",titulo:"O sistema está lento",emoji:"🐌",subtitulo:"Por onde começar a investigar",perguntas_iniciais:["Lento para todos ou para usuários específicos (região, plano, volume de dados)?","Lento em tudo ou em funcionalidades específicas?","Começou quando? O que mudou antes?","Houve aumento de volume de uso?","Tem correlação com horário?"],arvore:[{hipotese:"Banco de dados",sinais:["Queries lentas nos logs","CPU do banco elevada","Lentidão em relatórios mas não em ações simples"],acao:"Solicitar slow query log. Verificar se há queries sem índice em tabelas que cresceram recentemente."},{hipotese:"Infra subdimensionada",sinais:["CPU/memória dos servidores elevada","Lentidão correlacionada com horário de pico","Sem mudanças recentes de código"],acao:"Verificar dashboards de CPU/memória. Comparar com baseline histórico. Avaliar auto scaling."},{hipotese:"Memory leak",sinais:["Lentidão que piora progressivamente e melhora após reinicialização","Consumo de memória crescente nos dashboards"],acao:"Verificar trend de memória nas últimas 24-48h. Se crescente e sem estabilização, é memory leak."},{hipotese:"Integração externa lenta",sinais:["Lentidão só em funcionalidades que chamam serviço externo","Timeouts aparecendo nos logs"],acao:"Verificar latência das chamadas externas nos traces. Contatar o parceiro para verificar status."},{hipotese:"Deploy recente",sinais:["Lentidão começou após um deploy específico","Correlação temporal clara"],acao:"Comparar performance antes e depois do deploy. Avaliar rollback enquanto investiga a causa."}],nao_faca:["Reiniciar o servidor como 'solução' sem investigar a causa raiz","Aceitar 'o sistema sempre foi lento' como resposta sem dados que confirmem","Solicitar análise sem definir o que é 'lento' em termos de ms específicos"]},{id:"dev-sem-prazo",titulo:"O dev disse que não dá para dar um prazo",emoji:"🕳️",subtitulo:"O que isso significa e como reagir",o_que_pode_significar:[{causa:"Problema genuinamente complexo com incerteza técnica real",como_identificar:"Dev consegue articular o que não sabe. Fala de exploração necessária.",resposta_certa:"Proponha um spike de 1-2 dias para reduzir a incerteza antes de estimar."},{causa:"Dev que nunca aprendeu a estimar com incerteza declarada",como_identificar:"Dev tem dificuldade de dar qualquer número, mesmo com range.",resposta_certa:"'Qual o cenário mais pessimista? E o mais otimista?' Use esses números como range."},{causa:"Problema técnico bloqueante não comunicado",como_identificar:"Dev fala 'depende de resolver X antes' — X não estava mapeado.",resposta_certa:"Mapeie X. Quem resolve? Em quanto tempo? X vira item no backlog com prioridade."},{causa:"Experiência ruim de ser cobrado por estimativas",como_identificar:"Dev foi punido antes quando estimativa não se cumpriu.",resposta_certa:"Declare explicitamente: 'Estimativa não é compromisso. É referência. Você pode errar.'"},{causa:"Problema de confiança — dev não quer se comprometer com GP que muda tudo",como_identificar:"Resistência mais cultural que técnica. Outros devs também relutam.",resposta_certa:"Problema relacional. Precisa de conversa sobre como estimativas são usadas no time."}],nao_faca:["Pressionar por prazo sem entender a causa da resistência","Aceitar 'não sei' como resposta final sem explorar","Dar o prazo você mesmo baseado em achismo","Usar a estimativa do dev como compromisso público sem combinar isso com ele"]},{id:"eng-resistente",titulo:"A engenharia está resistente",emoji:"🧱",subtitulo:"Possíveis causas e como diagnosticar",causas:[{titulo:"Débito técnico invisível para o negócio",descricao:"O time está sobrecarregado de trabalho não visível (manutenção, bugs, infra) que não aparece no board mas consome capacidade real.",sinal:"Time diz 'não temos capacidade' mas o board parece razoável.",acao:"Faça um inventory de trabalho não planejado das últimas 3 sprints. Torne o invisible visible."},{titulo:"Mudanças de prioridade frequentes",descricao:"O time aprendeu que começar uma tarefa não significa que vai terminar — porque a prioridade vai mudar. Então investe menos no que começa.",sinal:"Devs começam tarefas mas não fecham. Board cheio de 'em andamento'.",acao:"Calcule: quantas histórias foram abandonadas no meio nas últimas 5 sprints? O número conta a história."},{titulo:"Decisões técnicas ignoradas",descricao:"O time propôs soluções técnicas que foram descartadas por pressão de prazo. Aprendeu que sua expertise não é valorizada.",sinal:"Tech Lead para de propor melhorias. Devs param de levantar riscos técnicos.",acao:"Revise as últimas 5 decisões técnicas: quantas foram tomadas pelo time vs. impostas de fora?"},{titulo:"Falta de ownership de produto",descricao:"O time está construindo features sem entender por quê. Sem contexto de negócio, o trabalho é mecânico — e a motivação é baixa.",sinal:"Devs não sabem responder 'para que serve essa feature?'",acao:"Inclua contexto de negócio no início de cada story: 'Estamos construindo isso porque [impacto esperado].'"},{titulo:"Experiência ruim com processo",descricao:"O processo ágil está sendo executado como ritual burocrático sem entregar valor: dailies de 40 minutos, plannings eternas, retros sem ação.",sinal:"Time participa das cerimônias mas sem engajamento real.",acao:"Pergunte diretamente ao Tech Lead: 'O que no nosso processo está criando mais fricção do que valor?'"}]},{id:"projeto-atrasando-silencioso",titulo:"O projeto está atrasando silenciosamente",emoji:"🕰️",subtitulo:"Sinais que aparecem semanas antes do prazo explodir",sinais_precoces:["Velocity da última sprint foi 15% abaixo da média — ninguém comentou","Dois itens foram movidos da sprint sem anúncio formal","Daily meeting terminando em 3 minutos — conversas reais não estão acontecendo","Tech Lead pedindo 'só mais um dia' em tasks que deveriam estar prontas","Histórias marcadas como 'done' mas com bugs conhecidos não documentados","QA está acumulando itens para testar — fila crescendo silenciosamente","Dev novo ainda 'onboarding' na sprint 4 — não foi integrado","Reunião com cliente cancelada duas vezes 'por agenda' — evitamento"],framework_diagnostico:"Faça essas 5 perguntas toda semana na quarta-feira (meio da sprint):",perguntas_diagnostico:["Baseado no burndown atual, terminaremos tudo o que está na sprint?","Tem algum item em andamento há mais de 3 dias sem movimento?","Tem alguma dependência externa que não foi resolvida?","O que está impedindo que os itens em QA sejam fechados?","Se eu remover um item da sprint agora, qual seria?"],regra_ouro:"Se a resposta para a pergunta 1 for 'não' e você estiver na quarta-feira, é hora de agir — não de esperar o review."}];const COMPARACOES_MATURIDADE=[{id:"junior-senior",titulo:"GP Júnior vs. GP Sênior em Tecnologia",emoji:"⚖️",comparacoes:[{situacao:"Recebe uma estimativa técnica inesperadamente alta",junior:"Questiona a estimativa. Pressiona por um número menor. 'É muito tempo para isso.'",senior:"Faz perguntas para entender. 'O que está tornando isso complexo? Quais são as alternativas?' Negocia escopo, não tempo."},{situacao:"O dev diz que algo é tecnicamente impossível",junior:"Aceita ou escala para o gestor.",senior:"Sabe que 'impossível' raramente é impossível — é 'impossível dentro de X restrições'. Pergunta: 'O que seria necessário para tornar isso possível?'"},{situacao:"O sistema cai em produção",junior:"Pergunta 'quando vai ficar pronto?' e espera.",senior:"Abre o protocolo de incidente, comunica o cliente, documenta a linha do tempo, pergunta 'temos rollback?'"},{situacao:"O cliente pede uma feature no meio da sprint",junior:"Adiciona ao backlog ou aceita na sprint sem análise.",senior:"'Para incluir isso, precisamos remover X ou Y. Qual é a prioridade?' Nunca adiciona sem remover equivalente."},{situacao:"A velocity caiu 30% esta sprint",junior:"Cobra o time para 'recuperar' na próxima sprint.",senior:"Investiga: o que foi diferente? Bloqueios não reportados? Débito técnico? Sobrecarga oculta? A causa determina a solução."},{situacao:"Recebe o Tech Spec para revisar",junior:"Aprova sem ler (não entende) ou devolve sem feedback específico.",senior:"Lê focado em: alternativas consideradas, riscos explícitos, métricas de sucesso, dependências. Faz perguntas cirúrgicas."},{situacao:"O stakeholder muda o requisito após o dev começar",junior:"Aceita a mudança e pede para o dev 'ajustar'.",senior:"Quantifica o impacto, apresenta ao stakeholder, documenta a decisão. 'Essa mudança impacta X pontos e Y dias. Você quer prosseguir?'"}]},{id:"agile-real-vs-teatro",titulo:"Agile Real vs. Agile Theater",emoji:"🎭",descricao:"Agile theater é quando as cerimônias acontecem mas os princípios são ignorados. É o pior dos dois mundos: burocracia do waterfall + imprevisibilidade do ágil.",comparacoes:[{aspecto:"Daily Meeting",real:"15 minutos. Foco em impedimentos. Conversas difíceis acontecem. Time usa para desobstruir.",teatro:"30-40 minutos de status report. Cada um fala o que fez. Gerente anota. Ninguém se ajuda."},{aspecto:"Sprint Planning",real:"Time estima junto. Questiona escopo. Negocia capacidade. Compromisso realista.",teatro:"GP apresenta a lista. Time aceita sem questionar. 'Sprint fechada' com 2x a capacidade real."},{aspecto:"Retrospectiva",real:"Problemas reais são nomeados. Ações com responsável e prazo. Resultados medidos na próxima retro.",teatro:"Post-its bonitos. Ninguém fala o problema real. Ações genéricas. Nada muda."},{aspecto:"Backlog",real:"Priorizado por valor. PO presente. Itens refinados. Time entende o porquê.",teatro:"Lista de features sem priorização clara. PO ausente. Itens ambíguos. Time não sabe o porquê."},{aspecto:"Definition of Done",real:"Clara, específica, respeitada. QA é parte do done. PO valida.",teatro:"Vaga ou inexistente. 'Done' = 'código escrito'. Bugs descobertos no review."},{aspecto:"Velocidade de entrega",real:"Previsível. Melhora progressivamente. Time confia na estimativa.",teatro:"Imprevisível. 'Vai para a próxima sprint' é regra, não exceção. Ninguém confia em data."}]},{id:"eng-madura-vs-desorganizada",titulo:"Engenharia Madura vs. Engenharia Desorganizada",emoji:"🔬",comparacoes:[{aspecto:"Deploy",madura:"Múltiplas vezes por semana. Automatizado. Com smoke test. Rollback em minutos.",desorganizada:"Uma vez por mês ou menos. Manual. Sem validação. Rollback = desastre."},{aspecto:"Incidentes",madura:"Detectados pelo monitoramento antes do cliente. Postmortem estruturado. Ação preventiva.",desorganizada:"Descobertos pelo cliente. Sem postmortem. Mesmo problema se repete."},{aspecto:"Testes",madura:"Suite automatizada cobrindo casos críticos. Roda na pipeline. Bloqueia deploy com falha.",desorganizada:"Testes manuais. Sem automação. 'A gente testa em produção'."},{aspecto:"Documentação",madura:"ADRs registrando decisões. Tech Specs para features complexas. Runbooks para operação.",desorganizada:"Nenhuma. 'Tá na cabeça do Pedro.'"},{aspecto:"On-call",madura:"Rotação estruturada. Runbooks. MTTR < 1h. Pós-incidente documentado.",desorganizada:"'Liga para o [nome]'. Disponibilidade individual. Sem processo. MTTR imprevisível."},{aspecto:"Débito técnico",madura:"Visível no backlog. Estimado. Priorizado com negócio. Pago progressivamente.",desorganizada:"Invisível. Acumulado. Descoberto quando explode."}]}];const CAMADA_EXECUTIVA=[{id:"negociacao-tecnica",titulo:"Negociação com Dimensão Técnica",emoji:"🤝",intro:"Negociar em projetos tech exige entender que prazo, escopo e qualidade formam um triângulo — você só pode fixar dois. Quem não entende isso negocia promovendo o impossível.",frameworks:[{nome:"Triângulo de Ferro do Projeto",desc:"Prazo + Escopo + Qualidade: escolha dois. Se o cliente quer prazo fixo e escopo fixo, qualidade vai ceder. Se quer escopo completo e qualidade, prazo vai ceder. Não existe exceção.",como_usar:"Quando pressionado por prazo e escopo simultaneamente, apresente o triângulo explicitamente: 'Podemos manter o prazo se reduzirmos o escopo em X, ou manter o escopo se estendermos o prazo em Y. Qual é a prioridade?'"},{nome:"Custo do Atraso (CoD)",desc:"Quanto custa cada semana de atraso para o negócio do cliente? Esse número muda completamente a conversa de priorização. Feature que parece baixa prioridade pode ter CoD altíssimo.",como_usar:"Pergunte ao cliente: 'Quanto representa para vocês cada semana sem essa funcionalidade?' Use para priorizar o backlog por valor de negócio, não por ordem de chegada."},{nome:"Trade-off Explícito",desc:"Toda decisão de projeto tem um trade-off. Torná-lo explícito transforma você de executor em parceiro estratégico.",como_usar:"'Se fizermos X agora, criamos débito técnico em Y que vai custar Z no futuro. Você quer prosseguir com esse trade-off documentado?' O cliente decide com informação, não no escuro."}],taticas:["Nunca negocie prazo sem negociar escopo junto — são a mesma alavanca","Documente toda negociação por escrito — memória é seletiva sob pressão","Apresente opções, não problemas. 'Temos 3 caminhos' é melhor que 'não vai dar'","Use dados para negociar — velocity histórica é mais convincente que opinião","Identifique quem realmente decide antes de entrar na sala de negociação"]},{id:"leitura-politica",titulo:"Leitura Política de Projetos",emoji:"🔭",intro:"Todo projeto tem uma camada técnica e uma camada política. A política frequentemente determina o sucesso mais do que a execução técnica.",sinais:[{sinal:"O sponsor não aparece nas reuniões",implicacao:"O projeto perdeu prioridade estratégica. Decisões vão travar por falta de poder de decisão. Risco de cancelamento ou de ser desprioritizado silenciosamente.",acao:"Solicite reunião direta com o sponsor para realinhar expectativas e confirmar comprometimento."},{sinal:"Múltiplas pessoas 'dono' do projeto do lado do cliente",implicacao:"Conflito de autoridade oculto. Decisões vão ser revertidas. O que uma pessoa aprova, outra vai questionar.",acao:"Mapeie quem tem a palavra final em cada tipo de decisão. Documente o modelo de governança desde o início."},{sinal:"Pedidos chegam por múltiplos canais (e-mail, Slack direto, reunião informal)",implicacao:"Não há canal único de comunicação. Demandas paralelas vão criar escopo oculto e conflito de prioridade.",acao:"Estabeleça formalmente: todo pedido de mudança passa pelo GP e pelo canal definido. Sem exceção."},{sinal:"O tech lead do cliente discorda das decisões do gestor do cliente",implicacao:"Conflito interno que vai se manifestar no projeto. O que o gestor aprova, o tech lead vai implementar diferente.",acao:"Identifique o conflito cedo. Traga ambos para a mesma conversa. Decisões técnicas precisam de alinhamento dos dois."},{sinal:"Silêncio após apresentação de problemas",implicacao:"O problema não foi entendido, ou foi entendido mas não há vontade de resolver. Silêncio não é concordância.",acao:"Explicitamente: 'Quero confirmar que estamos alinhados sobre o risco apresentado. Podemos documentar a decisão?'"}]},{id:"comunicacao-executiva",titulo:"Comunicação Executiva",emoji:"📡",intro:"Comunicação executiva não é sobre quantidade de informação — é sobre dar à pessoa certa a informação certa no momento certo para tomar a decisão certa.",principios:[{titulo:"Bottom Line Up Front (BLUF)",desc:"Comece com a conclusão. Executivos não leem para descobrir — leem para confirmar ou decidir. Dê o veredicto primeiro, a justificativa depois.",exemplo:"Ruim: 'Analisamos as opções, consideramos o prazo, avaliamos o impacto...' / Bom: 'Precisamos de 3 semanas a mais. A causa é X. As opções são A ou B. Recomendo A.'"},{titulo:"Impacto, não atividade",desc:"Executivos se importam com resultado, não com o que você fez. 'Fizemos 47 testes' importa menos que 'sistema está 40% mais rápido'.",exemplo:"Ruim: 'O time trabalhou muito esta sprint.' / Bom: 'Entregamos o módulo de checkout. Projeção de impacto: redução de 15% no abandono de carrinho.'"},{titulo:"Risco com probabilidade e impacto",desc:"Não apresente risco como lista. Apresente como matriz: probabilidade × impacto. Dê ao executivo o que ele precisa para priorizar.",exemplo:"'Temos 3 riscos críticos: O risco 1 (alta probabilidade, alto impacto) requer decisão esta semana. O risco 2 é mitigável com X. O risco 3 está sendo monitorado.'"},{titulo:"Uma recomendação, não opções infinitas",desc:"Apresentar 5 opções sem recomendação transfere o problema para o executivo. Seu trabalho é chegar com a recomendação fundamentada.",exemplo:"'Avaliamos 3 abordagens. Recomendamos a opção 2 pelos seguintes motivos. Aqui estão os trade-offs das outras se quiser revisar.'"}]}];// FASE 02 — DADOS PARTE A
const VIDA_REAL={intro:"A maioria dos projetos não se parece com os casos de estudo do PMBOK. Se parece com isso:",retratos:[{titulo:"O projeto sem dono",desc:"Não tem sponsor ativo. Não tem PO. O cliente 'aprova tudo' mas nunca está disponível. O GP vira o repositório de todas as decisões — e o culpado de todos os atrasos.",sinais:["Reuniões de alinhamento sempre sem quórum decisório","'Vou verificar e te retorno' que nunca retorna","Aprovações por e-mail que são revertidas em reunião","Backlog que cresce sem nenhum item sendo descartado"],sobrevivencia:"Crie um RACI de uma página e peça assinatura. Não para burocracia — para forçar a conversa sobre quem decide o quê. Sem dono de decisão, você não tem projeto, tem negociação permanente."},{titulo:"O time de um homem só",desc:"GP + dev + cliente. Sem QA, sem UX, sem PO. Todos os papéis são seus mais o que sobrar. É a realidade de 80% das consultorias de médio porte.",sinais:["'O GP vai levantar os requisitos, testar e documentar'","Critérios de aceite escritos depois que o código foi feito","QA é o próprio cliente clicando em produção","UX é o dev decidindo o que parece bom"],sobrevivencia:"Aceite a realidade e minimize o dano. Sequência de priorização: (1) critério de aceite claro antes de começar, (2) teste mínimo documentado antes de entregar, (3) comunicação de risco explícita quando algo for pulado. Você não vai ter o time ideal. Tenha o processo mínimo viável."},{titulo:"O backlog que é uma lista de desejos",desc:"Centenas de itens sem priorização. Tudo é 'urgente'. Nada tem critério de aceite. O cliente adiciona itens toda semana. O time não sabe o que fazer.",sinais:["Backlog com 200+ itens todos com prioridade 'alta'","Histórias sem critério de aceite — só título","Items adicionados sem discussão de impacto","Sprint planning levando 4h porque ninguém preparou nada"],sobrevivencia:"Congele o backlog por 48h. Trabalhe com o cliente para definir os 10 itens que, se entregues, justificam o projeto inteiro. Esses são seus 'must-haves'. O resto é 'nice-to-have' ou 'talvez nunca'. Esta é a única saída do labirinto do backlog infinito."},{titulo:"A prioridade que muda toda semana",desc:"Segunda-feira: 'o módulo de relatórios é urgente'. Quinta-feira: 'esquece, agora é o cadastro de clientes'. Na outra semana: 'voltamos para os relatórios'.",sinais:["Sprint planning que desconsidera o que foi planejado na semana anterior","Time com 'em andamento' mas nada sendo concluído","Dev perguntando 'mas qual é mesmo a prioridade agora?'","GP sem resposta para 'quando vai ficar pronto?'"],sobrevivencia:"Implante o conceito de 'custo de troca'. Toda mudança de prioridade precisa de uma resposta: 'O que paramos para fazer isso?' Sem resposta, a mudança não acontece. Isso força o cliente a internalizar que trocar prioridade não é de graça."},{titulo:"A engenharia sobrecarregada invisível",desc:"O time está com 100% de capacidade visível no board e 40% adicional em trabalho que não aparece: suporte, bugs em produção, dívida técnica, reuniões.",sinais:["Velocity caindo sem mudança aparente de escopo","Devs trabalhando até tarde mas entregando menos","'Estou nisso faz 3 dias' para tarefa de 1 dia","Tech Lead sempre disponível para resolver emergências mas nunca para planejamento"],sobrevivencia:"Faça o invisible visible. Peça ao time para registrar por uma semana TODO o trabalho, incluindo o não planejado. O número que vai aparecer vai justificar a conversa de capacidade real com o cliente."}],estrutura_minima:{titulo:"A estrutura mínima viável para qualquer projeto",intro:"Você não vai ter processos perfeitos. Mas sem esses 5 elementos, não é projeto — é esperança.",elementos:[{num:"01",nome:"Um objetivo de negócio claro",desc:"Não 'construir um sistema'. Mas 'reduzir em 40% o tempo de processamento de pedidos'. Sem isso, você não sabe quando terminou.",teste:"Consigo responder 'como saberemos que o projeto foi bem-sucedido?' em uma frase?"},{num:"02",nome:"Um dono de decisão identificado",desc:"Uma pessoa — não um comitê — que pode dizer sim ou não para mudanças de escopo e prazo. Comitê sem líder = decisão nunca tomada.",teste:"Se eu precisar de uma decisão crítica em 2 horas, tenho uma pessoa para ligar?"},{num:"03",nome:"Critério de aceite antes do desenvolvimento",desc:"O que exatamente precisa funcionar para essa história ser considerada pronta? Sem isso, 'pronto' é uma opinião.",teste:"O dev e o cliente concordariam sobre o que é 'pronto' sem conversar?"},{num:"04",nome:"Um processo de mudança de escopo",desc:"Toda mudança tem um impacto. Todo impacto precisa de decisão. Sem processo, mudança acontece sem decisão — e o caos é garantido.",teste:"Se o cliente pedir uma mudança agora, tenho um processo para avaliar e responder?"},{num:"05",nome:"Uma cadência de comunicação",desc:"O cliente precisa saber o que está acontecendo sem precisar perguntar. Sem cadência, o GP fica em modo reativo permanente.",teste:"O cliente sabe hoje o estado do projeto sem ter me perguntado?"}]}};const STAKEHOLDERS_DIFICEIS=[{id:"ausente",tipo:"O Stakeholder Ausente",emoji:"👻",descricao:"Aprova tudo em teoria, não aparece na prática. Delega para alguém que não tem poder de decisão real. Só aparece quando algo deu muito errado.",como_identificar:["Reuniões sempre representadas por alguém 'em nome de'","Decisões aprovadas por e-mail revertidas depois","Feedback chegando semanas após a entrega","'Vou levar para a diretoria' que nunca retorna"],risco_real:"Você pode completar tecnicamente um projeto inteiro e descobrir na entrega final que o decisor real queria algo diferente. O risco não é técnico — é de alinhamento com quem realmente importa.",impacto_projeto:"Mudanças de direção tardias. Aprovações que não valem nada. Prazo estourado por decisões que não saem.",como_responder:["Mapeie quem é o decisor real — pode não ser o contato operacional","Crie pontos de checkpoint formais que exijam presença do decisor (não do representante)","Documente tudo e envie cópias para o decisor, não só para o contato operacional","'Preciso de uma decisão sobre X até sexta. Posso agendar 15 minutos com você?' — não aceite delegação para quem não decide"],proteja_o_time:"Nunca deixe seu time receber diretrizes conflitantes de múltiplos representantes. Filtre e unifique antes de chegar para eles."},{id:"microgerenciador",tipo:"O Microgerenciador",emoji:"🔬",descricao:"Quer acompanhar cada detalhe. Pergunta sobre o progresso diariamente. Pede acesso a tudo. Revisa decisões técnicas sem contexto. Cria ansiedade no time.",como_identificar:["Mensagens diárias perguntando 'como está?'","Pedidos para participar de dailies internas","Questionamentos sobre decisões técnicas sem entender o contexto","Feedback sobre detalhes que não impactam o resultado"],risco_real:"O microgerenciamento é quase sempre sintoma de falta de confiança — seja no processo, na equipe ou em si mesmo. Combater o comportamento sem endereçar a causa cria escalada.",impacto_projeto:"Time perdendo tempo em relatórios desnecessários. Decisões paralisadas por excesso de revisão. Desgaste e desmotivação.",como_responder:["Aumente a frequência e a qualidade das comunicações proativas — menos espaço para ansiedade","Crie dashboard ou relatório semanal que responda as perguntas antes de serem feitas","'Percebo que você tem acompanhado de perto — há alguma preocupação específica que posso endereçar?'","Ofereça visibilidade estruturada ao invés de acesso irrestrito"],proteja_o_time:"Filtre o microgerenciamento antes de chegar para o time. Você é o buffer. Traduza as preocupações do cliente em contexto útil, não em ansiedade transferida."},{id:"urgencia-falsa",tipo:"O Criador de Urgências Falsas",emoji:"🚨",descricao:"Tudo é urgente. Tudo é para ontem. Muda de prioridade toda semana com a mesma intensidade. 'Urgente' perdeu o significado.",como_identificar:["'Urgente' em todo e-mail, independentemente do assunto","Prioridades que mudam com frequência semanal ou menor","Pressão por prazo sem justificativa de negócio","Quando você perguntar 'o que acontece se não fizermos isso esta semana?' a resposta é vaga"],risco_real:"Urgência falsa cria urgência real — no time. Burnout, decisões ruins por pressa, débito técnico por atalhos. A urgência do cliente vira custo interno.",impacto_projeto:"Time em modo reativo permanente. Qualidade caindo. Planejamento se tornando impossível.",como_responder:["Para cada urgência, pergunte: 'Qual o impacto de negócio se isso ficar para a próxima sprint?'","Crie uma matriz visual de urgência × importância com o cliente — force a priorização explícita","'Para priorizar X, precisamos desprioritizar Y ou Z. Qual você escolhe?'","Documente cada troca de prioridade com data e impacto — o acúmulo é evidência"],proteja_o_time:"Nunca deixe urgência falsa do cliente virar sprint caótica para o time. Filtre, questione e só então delibere."},{id:"escopo-infinito",tipo:"O Expandidor de Escopo",emoji:"🌊",descricao:"'Só mais uma coisinha' em cada reunião. Escopo que nunca para de crescer. Cada entrega gera 3 novos pedidos. O projeto nunca termina.",como_identificar:["Feature nova em toda reunião de alinhamento","'Isso é pequeno, não vai demorar nada' repetido constantemente","Backlog que cresce mais rápido do que é consumido","Questionamento das estimativas do time toda vez que há adição"],risco_real:"Escopo infinito não é sobre ambição do cliente — é sobre falta de clareza sobre o que o projeto resolve. Quando o objetivo é vago, qualquer feature parece necessária.",impacto_projeto:"Projeto que nunca termina. Time sem senso de conquista. Margem erodida. Relacionamento comercial deteriorado.",como_responder:["Volte ao objetivo de negócio: 'Essa feature ajuda a atingir [objetivo X]? Como?'","'Adoraria incluir isso. Vai entrar na próxima fase ou substituir algo desta fase?'","Crie change log visual mostrando crescimento do escopo desde o início","Apresente o impacto acumulado: 'Desde o kick-off, crescemos 38%. Isso representa N semanas adicionais.'"],proteja_o_time:"Nunca deixe escopo chegar para o time sem ter passado pela análise de impacto. O dev não precisa saber que o cliente queria 'só uma coisinha'."},{id:"sem-decisao",tipo:"O Indeciso Crônico",emoji:"🫠",descricao:"Apresenta opções, pede novas opções. Aprova, depois muda de ideia. Nunca está pronto para decidir. 'Precisa consultar mais pessoas' é o modo padrão.",como_identificar:["Reuniões que terminam sem decisão mesmo com todas as informações","Aprovações condicionais: 'está bom, mas deixa eu verificar com X'","Mesmo assunto revisitado em múltiplas reuniões","'Não estou seguro' sem conseguir articular o que falta para estar"],risco_real:"Indecisão crônica quase sempre tem uma causa raiz: medo de responsabilidade, conflito interno não resolvido, ou pressão de cima que o cliente não está comunicando.",impacto_projeto:"Projeto paralisado esperando decisão. Time em standby. Prazo consumido por espera, não por trabalho.",como_responder:["Identifique o que está bloqueando a decisão — muitas vezes é um medo não dito","Reduza as opções: nunca apresente mais de 3, idealmente 2","'Se você não decidir até X, precisaremos seguir com Y por padrão — posso documentar isso?'","Torne o custo da indecisão visível: cada semana sem decisão = N dias de atraso"],proteja_o_time:"Decisão pendente não deve virar bloqueio para o time. Identifique o que pode avançar em paralelo enquanto aguarda."},{id:"politico",tipo:"O Stakeholder Político",emoji:"♟️",descricao:"Tem agenda própria. Usa o projeto como instrumento de poder organizacional. Aprova publicamente e sabota silenciosamente. Tem dois discursos.",como_identificar:["Posição diferente em reunião pública vs. conversa privada","Feedback positivo em reunião, e-mail negativo para a chefia depois","Alianças que mudam dependendo de quem está na sala","Questionamentos sobre decisões já tomadas chegando por canais não-oficiais"],risco_real:"O stakeholder político não está gerenciando um projeto — está gerenciando sua posição. O proje
